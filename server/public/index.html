<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Accounting (Mock) · 관리자</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <header>
    <span class="dot"></span>
    <div>
      <h1>E-Accounting <span class="sub">· 관리자 콘솔 (Mock)</span></h1>
      <div class="sub">법인카드 승인내역 · 접수 전표 · 결재라인</div>
    </div>
    <div class="spacer"></div>
    <span class="sub" id="clock"></span>
    <button class="reset" onclick="resetDemo()">데모 리셋</button>
  </header>

  <div class="wrap">
    <section class="card">
      <h2>💳 법인카드 승인내역 <span class="count" id="txCount"></span></h2>
      <div class="body" id="txList"></div>
    </section>

    <section class="card">
      <h2>🧾 접수된 전표 <span class="count" id="vchCount"></span></h2>
      <div class="body" id="vchList"></div>
    </section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
