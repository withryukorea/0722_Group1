<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ea002c">
  <meta name="description" content="영수증을 촬영하고 OCR 내용을 확인해 공용 서버에 저장하는 모바일 정산 웹앱">
  <title>찍으면 끝 · 영수증 정산</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-head">
      <div class="app-head-row">
        <a class="brand" href="#dashboard" id="home-link" aria-label="찍으면 끝 대시보드로">
          <span class="brand-wing" aria-hidden="true"><i></i><i></i></span>
          <span><b>찍으면 <em>끝</em></b><small>SK 출장·경비 자동정산</small></span>
        </a>
        <div class="header-side">
          <span class="header-user">정성훈 · Upstream기술팀</span>
          <button class="icon-button" id="reset-button" type="button" aria-label="배정된 정산단위 확인" title="배정된 정산단위 확인">출장</button>
        </div>
      </div>
      <div class="app-head-sub">
        <span id="header-sub">영수증 사진 한 장으로 정산 끝</span>
        <span class="connection-state"><i class="connection-dot" aria-hidden="true"></i><span id="connection-label">연결 확인 중</span></span>
      </div>
    </header>

    <main id="screen-root" tabindex="-1"></main>

    <nav class="bottom-nav" id="bottom-nav" aria-label="주요 메뉴" hidden>
      <button type="button" data-route="dashboard"><span class="nav-icon home" aria-hidden="true"></span><b>홈</b></button>
      <button class="nav-capture" type="button" data-route="capture"><span class="camera-icon" aria-hidden="true"></span><b>촬영</b></button>
      <button type="button" data-route="receipts"><span class="nav-icon receipt" aria-hidden="true"></span><b>영수증</b></button>
      <button type="button" data-route="setup"><span class="nav-icon calendar" aria-hidden="true"></span><b>정산단위</b></button>
    </nav>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <input id="receipt-camera" class="visually-hidden" type="file" accept="image/*" capture="environment">
  <input id="receipt-gallery" class="visually-hidden" type="file" accept="image/*">

  <script type="module" src="app.js?v=7-real-ocr-only"></script>
</body>
</html>
