<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>찍으면 끝 — 분석 대시보드</title>
<link rel="stylesheet" href="./sk-theme.css">
<link rel="stylesheet" href="./pc.css">
</head>
<body class="pc">
<header class="topbar"></header>

<div class="page">
  <div class="page-head">
    <div>
      <h1>분석 · 통계 대시보드</h1>
      <div class="desc">모바일 앱과 PC에서 등록된 모든 지출을 대분류 → 세부비목으로 분석합니다 · 카드 단위 내역은 <a href="expenses.html" style="color:var(--sk-red);font-weight:700">사용내역</a>에서 확인</div>
    </div>
    <a class="btn primary" href="upload.html">+ 영수증 업로드</a>
  </div>

  <!-- KPI -->
  <div class="grid kpi4" id="kpis" style="margin-bottom:16px"></div>

  <div class="grid c2" style="margin-bottom:16px">
    <!-- 대분류 도넛 + 세부비목 -->
    <section class="card">
      <div class="card-title">카테고리별 사용 구성 <span class="more">전체 누적 · 세부비목 포함</span></div>
      <div class="donut-wrap">
        <svg id="donut" width="210" height="210" viewBox="0 0 210 210" role="img" aria-label="대분류별 사용 구성 도넛 차트"></svg>
        <div class="donut-list" id="donutList"></div>
      </div>
      <div class="legend" id="donutLegend"></div>
    </section>

    <!-- 월별 추이 -->
    <section class="card">
      <div class="card-title">월별 사용 추이 <span class="more">대분류 누적 · 단위 천원</span></div>
      <div class="bars" id="bars"></div>
      <div class="legend" id="barsLegend"></div>
      <div class="chart-note">막대에 마우스를 올리면 월별 상세 금액이 표시됩니다</div>
    </section>
  </div>

  <div class="grid c2e" style="margin-bottom:16px">
    <!-- 출장비 기준 대비 -->
    <section class="card">
      <div class="card-title">출장비 기준 대비 사용 현황 <span class="more">기준 금액이 설정된 출장</span></div>
      <div id="tripGauges"></div>
    </section>

    <!-- 예산·제도 한도 -->
    <section class="card">
      <div class="card-title">한도·예산 현황 <span class="more">AI Tool은 정산 제도별 상한 적용</span></div>
      <div id="budgets"></div>
    </section>
  </div>

  <div class="grid c2e">
    <!-- 분류 판정 가이드라인 -->
    <section class="card">
      <div class="card-title">자동 분류 판정 가이드라인 <span class="more">왜 이렇게 분류됐나요?</span></div>
      <div id="rules"></div>
    </section>

    <!-- 최근 업로드 -->
    <section class="card">
      <div class="card-title">최근 등록 영수증 <a class="more" href="expenses.html">전체보기 ›</a></div>
      <table class="tbl" id="recentTbl"></table>
    </section>
  </div>
</div>

<script src="./config.js"></script>
<script src="./api.js"></script>
<script src="./data-live.js"></script>
<script src="./pc.js"></script>
<script>
SKD.load().then(function () {
const D = SKD;
SKP.chrome("dashboard");
SKD.mountBadge();
const tip = D.attachTip();

const all = D.valid();
const GT = D.groupTotals();
const grand = Object.values(GT).reduce((s, g) => s + g.total, 0);
const july = all.filter(r => r.paidAt.startsWith("2026-07"));
const julyTotal = july.reduce((s, r) => s + r.amountKRW, 0);
const reviewN = all.filter(r => r.status === "review").length;
const dupN = D.RECEIPTS.filter(r => r.status === "duplicate").length;
const aiB = D.BUDGETS[0];

/* ---- KPI ---- */
document.getElementById("kpis").innerHTML = `
  <div class="card kpi accent">
    <div class="k-label">사용 총액 (전체 누적)</div>
    <div class="k-val num">${D.krw(grand)}</div>
    <div class="k-sub">영수증 ${all.length}건 · 외화 자동 환산 포함</div>
  </div>
  <div class="card kpi">
    <div class="k-label">이번 달 사용 <span class="badge neutral">2026.07</span></div>
    <div class="k-val num">${D.krw(julyTotal)}</div>
    <div class="k-sub">${july.length}건 · 해외출장 진행중</div>
  </div>
  <div class="card kpi">
    <div class="k-label">확인 필요 <span class="badge warn">${reviewN}건</span></div>
    <div class="k-val num">${reviewN}<span style="font-size:14px;color:var(--ink-3)"> 건</span></div>
    <div class="k-sub">중복 인보이스 ${dupN}건 자동 제외됨</div>
  </div>
  <div class="card kpi">
    <div class="k-label">AI구독 한도 (DIY100) <span class="badge ${aiB.usedKRW > aiB.limitKRW ? "danger" : "ok"}">${aiB.usedKRW > aiB.limitKRW ? "초과" : "이내"}</span></div>
    <div class="k-val num" style="color:${aiB.usedKRW > aiB.limitKRW ? "var(--danger)" : "var(--ink)"}">${D.krw(Math.abs(aiB.limitKRW - aiB.usedKRW))}</div>
    <div class="k-sub">${aiB.usedKRW > aiB.limitKRW ? "DIY100 예산 기준 초과분 · 제도 변경 검토" : "DIY100 연 100만원(VAT별도) 기준 잔여"}</div>
  </div>`;

/* ---- 도넛 (대분류) ---- */
(function donut() {
  const cx = 105, cy = 105, R = 88, r = 56;
  let a0 = -Math.PI / 2;
  const svg = document.getElementById("donut");
  const segs = D.GROUP_ORDER.filter(g => GT[g].total > 0);
  svg.innerHTML = segs.map(g => {
    const v = GT[g].total, frac = v / grand;
    const a1 = a0 + frac * Math.PI * 2;
    /* 2px 간격: 각도 여백 */
    const pad = 0.018;
    const s = a0 + pad, e = a1 - pad;
    const large = (e - s) > Math.PI ? 1 : 0;
    const p = (a, rad) => `${cx + rad * Math.cos(a)},${cy + rad * Math.sin(a)}`;
    const d = `M ${p(s, R)} A ${R} ${R} 0 ${large} 1 ${p(e, R)} L ${p(e, r)} A ${r} ${r} 0 ${large} 0 ${p(s, r)} Z`;
    a0 = a1;
    return `<path d="${d}" fill="${D.GROUPS[g].hex}" data-g="${g}" style="cursor:pointer"></path>`;
  }).join("") + `
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" class="donut-center">사용 총액</text>
    <text x="${cx}" y="${cy + 16}" text-anchor="middle" style="font-size:16px;font-weight:800;fill:var(--ink)">${D.fmt(grand / 10000)}만원</text>`;

  svg.querySelectorAll("path").forEach(pth => {
    pth.addEventListener("mousemove", (e) => {
      const g = pth.dataset.g, t = GT[g];
      const subs = Object.entries(t.subs).map(([s, v]) => `<span class="tl">${s}</span> ${D.krw(v)}`).join("<br>");
      tip.show(`<b>${D.GROUPS[g].name}</b> · ${D.krw(t.total)} (${Math.round(t.total / grand * 100)}%)<br>${subs}`, e.clientX, e.clientY);
    });
    pth.addEventListener("mouseleave", tip.hide);
  });

  document.getElementById("donutList").innerHTML = segs.map(g => {
    const t = GT[g];
    const subs = Object.entries(t.subs).sort((a, b) => b[1] - a[1])
      .map(([s, v]) => `${s} ${D.fmt(v / 1000)}k`).join(" · ");
    return `
      <div class="row"><span class="cat"><i style="background:${D.GROUPS[g].hex}"></i></span>
        <span class="nm">${D.GROUPS[g].name}</span>
        <span class="pct">${Math.round(t.total / grand * 100)}%</span>
        <b class="num">${D.krw(t.total)}</b></div>
      <div class="subs">${subs}</div>`;
  }).join("");
  document.getElementById("donutLegend").innerHTML = segs.map(g =>
    `<span class="cat"><i style="background:${D.GROUPS[g].hex}"></i>${D.GROUPS[g].name}</span>`).join("");
})();

/* ---- 월별 스택 막대 ---- */
(function bars() {
  const months = [...new Set(all.map(r => r.paidAt.slice(0, 7)))].sort();
  const byM = months.map(m => {
    const rows = all.filter(r => r.paidAt.startsWith(m));
    const per = {}; let tot = 0;
    D.GROUP_ORDER.forEach(g => per[g] = 0);
    rows.forEach(r => { per[D.groupOf(r)] += r.amountKRW; tot += r.amountKRW; });
    return { m, per, tot };
  });
  const max = Math.max(...byM.map(x => x.tot));
  const H = 150;
  document.getElementById("bars").innerHTML = byM.map(x => `
    <div class="bcol">
      <span class="bv num">${D.fmt(x.tot / 1000)}k</span>
      <div class="stack" data-m="${x.m}" style="height:${Math.max(4, x.tot / max * H)}px">
        ${D.GROUP_ORDER.filter(g => x.per[g] > 0).map(g =>
          `<div class="seg" style="flex:${x.per[g]};background:${D.GROUPS[g].hex}"></div>`).join("")}
      </div>
      <span class="bl">${x.m.slice(2).replace("-", ".")}</span>
    </div>`).join("");
  document.querySelectorAll(".stack").forEach(st => {
    const x = byM.find(b => b.m === st.dataset.m);
    st.addEventListener("mousemove", (e) => {
      const lines = D.GROUP_ORDER.filter(g => x.per[g] > 0)
        .map(g => `<span class="tl">${D.GROUPS[g].name}</span> ${D.krw(x.per[g])}`).join("<br>");
      tip.show(`<b>${x.m.replace("-", "년 ")}월</b> · ${D.krw(x.tot)}<br>${lines}`, e.clientX, e.clientY);
    });
    st.addEventListener("mouseleave", tip.hide);
  });
  document.getElementById("barsLegend").innerHTML = D.GROUP_ORDER.map(g =>
    `<span class="cat"><i style="background:${D.GROUPS[g].hex}"></i>${D.GROUPS[g].name}</span>`).join("");
})();

/* ---- 출장 기준 게이지 + 일당 잔액 트래커(일자별 차감) ---- */
document.getElementById("tripGauges").innerHTML = D.TRIPS.map(t => {
  const cap = D.tripCap(t), spent = D.tripSpent(t);
  const pct = Math.min(100, spent / cap * 100), over = spent > cap;
  const st = t.status === "active" ? '<span class="badge brand">진행중</span>'
    : t.status === "planned" ? '<span class="badge info">예정</span>' : '<span class="badge neutral">완료</span>';

  /* 일자별 사용액: 국내는 식대만, 해외는 전 항목. 사전결제 건은 이용일(serviceDate) 기준 */
  let dayRows = "";
  if (t.status !== "planned") {
    const dailyCap = t.type === "domestic" ? t.mealCapPerDayKRW : t.dailyCapKRW;
    const days = [];
    for (let d = new Date(t.startDate); d <= new Date(t.endDate); d.setDate(d.getDate() + 1))
      days.push(d.toISOString().slice(0, 10));
    dayRows = `<div style="margin:8px 0 2px;display:grid;gap:4px">` + days.map(day => {
      const used = D.RECEIPTS.filter(r => r.tripId === t.id && r.status !== "duplicate" && r.serviceDate === day)
        .filter(r => t.type === "domestic" ? r.category === "TRAVEL_MEAL" : true)
        .reduce((s, r) => s + r.amountKRW, 0);
      const future = day > D.TODAY;
      const dOver = used > dailyCap;
      return `
      <div style="display:flex;align-items:center;gap:8px;font-size:11px">
        <span style="width:44px;color:var(--ink-3)" class="num">${day.slice(5).replace("-", "/")}${day === D.TODAY ? " ●" : ""}</span>
        <div style="flex:1;height:5px;background:#ECEEF3;border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100, used / dailyCap * 100)}%;background:${dOver ? "var(--danger)" : "var(--sk-orange)"};border-radius:99px"></div>
        </div>
        <span class="num" style="width:150px;text-align:right;color:${future ? "var(--ink-3)" : dOver ? "var(--danger)" : "var(--ink-2)"}">
          ${future ? "예정" : `${D.krw(used)} · 잔여 ${D.krw(Math.max(0, dailyCap - used))}`}</span>
      </div>`;
    }).join("") + `</div>`;
  }

  return `
  <div class="gauge ${over ? "over" : ""}" style="margin-bottom:18px">
    <div class="g-head">
      <span>${t.type === "domestic" ? "🚄" : "✈"} <b>${t.title}</b> ${st}
        <span class="muted" style="margin-left:4px">${D.dateShort(t.startDate)}~${D.dateShort(t.endDate)} · ${t.members}명 · 정산단위 분리</span></span>
      <b class="num">${D.krw(spent)} / ${D.krw(cap)}</b>
    </div>
    <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
    <div class="g-foot"><span>${t.capNote}</span>
      <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">
        ${t.status === "planned" ? "시작 전" : over ? "기준 초과 " + D.krw(spent - cap) : "기준 이내 ✓ 잔여 " + D.krw(cap - spent)}</span></div>
    ${dayRows}
  </div>`;
}).join("");

/* ---- 예산·제도 ---- */
document.getElementById("budgets").innerHTML =
  D.BUDGETS.map(b => {
    const pct = Math.min(100, b.usedKRW / b.limitKRW * 100), over = b.usedKRW > b.limitKRW;
    return `
    <div class="gauge ${over ? "over" : ""}" style="margin-bottom:16px">
      <div class="g-head"><span>${b.label}</span><b class="num">${D.krw(b.usedKRW)} / ${D.krw(b.limitKRW)}</b></div>
      <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
      <div class="g-foot"><span>${Math.round(pct)}% 소진</span>
        <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "⚠ 초과 " + D.krw(b.usedKRW - b.limitKRW) : "잔여 " + D.krw(b.limitKRW - b.usedKRW)}</span></div>
    </div>`;
  }).join("") +
  `<div style="border-top:1px dashed var(--line);padding-top:12px;font-size:12.5px">
    <b style="font-size:12px;color:var(--ink-2)">AI Tool 정산 제도별 상한</b>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      ${D.AI_PRESETS.map(p => {
        const over = D.BUDGETS[0].usedKRW > p.capKRW;
        return `<span class="badge ${over ? "danger" : "ok"}" style="font-size:11.5px;padding:6px 10px">${p.name} ${D.krw(p.capKRW)} ${over ? "초과" : "이내"}</span>`;
      }).join("")}
    </div>
    <p class="muted" style="margin-top:8px">현재 사용액 ${D.krw(D.BUDGETS[0].usedKRW)} · 기본 제도: DIY100 예산 정산 (연 1,000,000원 · VAT별도)</p>
  </div>`;

/* ---- 가이드라인 ---- */
document.getElementById("rules").innerHTML = D.RULES.map((r, i) => `
  <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);${i === D.RULES.length - 1 ? "border-bottom:none" : ""}">
    <span style="flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--sk-grad);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center">${i + 1}</span>
    <div style="font-size:13px"><b>${r.t}</b><div class="muted" style="margin-top:2px;line-height:1.5">${r.d}</div></div>
  </div>`).join("");

/* ---- 최근 테이블 ---- */
document.getElementById("recentTbl").innerHTML = `
  <thead><tr><th>가맹점</th><th>분류</th><th>일시</th><th style="text-align:right">금액</th></tr></thead>
  <tbody>${all.slice().sort((a, b) => b.paidAt.localeCompare(a.paidAt)).slice(0, 6).map(r => {
    const G = D.GROUPS[D.groupOf(r)];
    return `<tr>
      <td style="font-weight:700">${r.merchant}</td>
      <td><span class="cat"><i style="background:${G.hex}"></i>${G.name} · ${D.subOf(r)}</span></td>
      <td class="muted">${D.dt(r.paidAt)}</td>
      <td class="num">${D.krw(r.amountKRW)}</td></tr>`;
  }).join("")}</tbody>`;
});
</script>
</body>
</html>
