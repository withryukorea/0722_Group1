<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>찍으면 끝 — 영수증 업로드</title>
<link rel="stylesheet" href="./sk-theme.css">
<link rel="stylesheet" href="./pc.css">
</head>
<body class="pc">
<header class="topbar"></header>

<div class="page">
  <div class="page-head">
    <div>
      <h1>영수증 업로드</h1>
      <div class="desc">영수증 사진(JPG/PNG/WebP)을 올리면 실제 Vision OCR → 프리셋 분류까지 진행됩니다</div>
    </div>
  </div>

  <div class="grid c2">
    <div>
      <!-- 드롭존 -->
      <div class="dropzone" id="dz">
        <div class="dz-icon">🧾</div>
        <h3>여기로 파일을 끌어다 놓으세요</h3>
        <p class="muted">또는 <label style="color:var(--sk-red);font-weight:700;cursor:pointer">파일 선택<input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp" hidden></label> · 여러 장 동시 업로드 가능</p>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:14px">
          <span class="badge info">📷 실제 사진 → Vision OCR</span>
          <span class="badge neutral">인식 성공 건만 저장</span>
        </div>
      </div>

      <!-- 처리 큐 -->
      <section class="card" style="margin-top:14px">
        <div class="card-title">처리 현황 <span class="more" id="queueCount">0건</span></div>
        <div id="queue"><p class="muted" style="padding:8px 0">업로드된 파일이 여기에 표시됩니다</p></div>
      </section>
    </div>

    <div>
      <!-- 처리 파이프라인 안내 -->
      <section class="card">
        <div class="card-title">자동 처리 파이프라인</div>
        <div id="pipeSteps"></div>
      </section>

      <!-- 인식 결과 미리보기 -->
      <section class="card" style="margin-top:14px">
        <div class="card-title">최근 인식 결과</div>
        <div id="lastResult"><p class="muted">파일을 업로드하면 인식 결과가 표시됩니다</p></div>
      </section>
    </div>
  </div>
</div>

<script src="./config.js"></script>
<script src="./api.js"></script>
<script src="./data-live.js"></script>
<script src="./pc.js"></script>
<script>
SKD.load().then(function () {
const D = SKD;
SKP.chrome("upload");
SKD.mountBadge();
const $ = (id) => document.getElementById(id);

/* 파이프라인 단계 안내 */
const STEPS = [
  ["업로드", "JPG·PNG·WebP 사진 접수 (모바일 앱과 동일 저장소)"],
  ["자동 크롭", "영수증 영역 감지 — 실패 시 원본 사용"],
  ["OCR / 파싱", "Vision OCR로 가맹점·금액·결제일시를 실제 인식"],
  ["프리셋 분류", "출장 일정·가맹점 프리셋으로 대분류/세부비목 자동 지정"],
  ["중복 검사", "invoiceNo 기준 — 인보이스/영수증 중복 자동 제외"],
  ["카드 매칭", "금액·일시·가맹점으로 법인카드 승인내역과 매칭"]
];
$("pipeSteps").innerHTML = STEPS.map(([t, d], i) => `
  <div style="display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);${i === STEPS.length - 1 ? "border-bottom:none" : ""}">
    <span style="flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:var(--sk-grad);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center">${i + 1}</span>
    <div style="font-size:12.5px"><b>${t}</b><div class="muted" style="margin-top:1px">${d}</div></div>
  </div>`).join("");

/* 업로드 큐 */
let queue = [];

/* 실제 업로드(드롭·파일 선택) — POST /api/receipts 로 유입. 성공 응답 시에만 완료 표시. */
function uploadFile(file) {
  const isImage = Boolean(file && file.type && file.type.startsWith("image/"));
  const item = {
    kind: "upload",
    id: "q" + Date.now() + Math.random().toString(36).slice(2, 5),
    name: file ? file.name : "알 수 없는 파일",
    file,                    // 재시도용 원본 파일 보관
    isPdf: false,
    objUrl: isImage ? URL.createObjectURL(file) : null,
    status: isImage ? "uploading" : "failed",     // uploading | done | failed
    error: isImage ? null : "현재 실제 OCR은 JPG·PNG·WebP 등 이미지 영수증만 지원합니다.",
    receipt: null
  };
  queue.unshift(item);
  if (isImage) sendUpload(item);
  else renderQueue();
}

async function sendUpload(item) {
  item.status = "uploading";
  item.error = null;
  renderQueue();
  try {
    const receipt = await PC_API.uploadReceipt(item.file, "pc");
    if (!receipt || !receipt.id) throw new Error("서버 응답에 접수 ID가 없습니다");
    item.receipt = receipt;
    item.status = "done";              // 성공 응답을 받은 경우에만 완료
    renderQueue();
    showServerResult(item);            // 서버가 저장한 실제 영수증으로 결과 표시
  } catch (e) {
    // 서버 미접수 → 완료로 위장하지 않는다. 큐에 원인+재시도만 표시하고 결과화면으로 넘어가지 않음.
    item.status = "failed";
    item.error = (e && e.message) ? e.message : "업로드 실패";
    renderQueue();
  }
}

function renderQueue() {
  $("queueCount").textContent = queue.length + "건";
  $("queue").innerHTML = queue.map(renderUploadItem).join("") || '<p class="muted" style="padding:8px 0">업로드된 파일이 여기에 표시됩니다</p>';
}

function renderUploadItem(it) {
  const badge = it.status === "done" ? '<span class="badge ok">✓ 접수 완료</span>'
    : it.status === "failed" ? '<span class="badge danger">✗ 업로드 실패</span>'
    : '<span class="badge info">업로드 중…</span>';
  const body = it.status === "failed"
    ? `<div class="preset-why" style="background:var(--danger-bg);border-color:#F3B8C4;color:#9B1230;margin-top:8px">
         ⚠️ <b>서버에 접수되지 않았습니다</b> — 파일이 저장되지 않았습니다. <span class="muted">(${it.error})</span>
       </div>
       <button class="btn" data-retry="${it.id}" style="margin-top:8px">다시 시도</button>`
    : `<div class="pipeline" style="margin-top:6px">
         <b style="color:${it.status === "done" ? "var(--ok)" : "var(--sk-red)"}">업로드</b>
         <span class="arrow">›</span>
         <b style="color:${it.status === "done" ? "var(--ok)" : "var(--ink-3)"}">서버 접수 (POST /api/receipts)</b>
       </div>`;
  return `
    <div style="padding:10px 0;border-bottom:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <b style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.isPdf ? "📄" : "📷"} ${it.name}</b>
        ${badge}
      </div>
      ${body}
    </div>`;
}

/* 실패 항목 재시도 (delegation — renderQueue가 innerHTML을 갈아끼워도 유지) */
$("queue").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-retry]");
  if (!btn) return;
  const it = queue.find((q) => q.id === btn.getAttribute("data-retry"));
  if (it) sendUpload(it);
});

/* 실제 업로드 성공 결과 — 서버가 저장한 receipt(JSON) 기준으로만 표시 */
function showServerResult(it) {
  const r = it.receipt || {};
  const o = r.ocr || {};
  const amount = Number(o.amount || 0);
  const cur = o.currency || "KRW";
  const krw = Number(r.amountKRW || 0);
  const dup = r.status === "duplicate" || (r.checks || []).some((c) => c.type === "DUPLICATE_DOCUMENT");
  const warns = (r.checks || []).filter((c) => c.type !== "DUPLICATE_DOCUMENT");
  $("lastResult").innerHTML = `
    ${it.objUrl ? `<img src="${it.objUrl}" style="width:100%;max-height:200px;object-fit:contain;background:#14161B;border-radius:10px" alt="">` : ""}
    <dl style="display:grid;grid-template-columns:86px 1fr;row-gap:7px;font-size:13px;margin-top:12px">
      <dt class="muted">가맹점</dt><dd style="font-weight:700">${o.merchant || "(인식 결과 없음)"}</dd>
      <dt class="muted">금액</dt><dd class="num" style="font-weight:700">${amount.toLocaleString()} ${cur}${cur !== "KRW" && krw ? ` → ${krw.toLocaleString()}원` : ""}</dd>
      <dt class="muted">일시</dt><dd>${o.paidAt || "—"}</dd>
      <dt class="muted">인식 방식</dt><dd><span class="badge ok">실제 OCR</span></dd>
      <dt class="muted">접수 ID</dt><dd class="num">${r.id}</dd>
    </dl>
    ${dup ? `<div class="preset-why" style="background:var(--danger-bg);border-color:#F3B8C4;color:#9B1230;margin-top:8px"><b>중복 문서 감지</b> — 동일 결제건 영수증이 이미 등록되어 있을 수 있습니다.</div>` : ""}
    ${warns.length ? `<div class="preset-why" style="background:var(--warn-bg);border-color:#EAD3A8;color:var(--warn);margin-top:8px">🏷 검토 필요: ${warns.map((c) => c.type).join(", ")}</div>` : ""}
    <div class="preset-why" style="margin-top:10px">서버(공유 저장소)에 접수 완료 — 모바일 앱·전표 화면과 동일 데이터로 공유됩니다.</div>
    <a class="btn primary block" style="margin-top:12px" href="expenses.html">사용내역에서 확인 ›</a>`;
}

/* 드래그앤드롭 + 파일 선택 */
const dz = $("dz");
["dragenter", "dragover"].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.add("over"); }));
["dragleave", "drop"].forEach(ev => dz.addEventListener(ev, (e) => { e.preventDefault(); dz.classList.remove("over"); }));
dz.addEventListener("drop", (e) => [...e.dataTransfer.files].forEach(uploadFile));
$("fileInput").onchange = (e) => [...e.target.files].forEach(uploadFile);
});
</script>
</body>
</html>
