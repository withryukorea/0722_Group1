<!DOCTYPE html>
<!-- 단독 실행형 스냅샷 (자동 생성) — 원본: design/screens/mobile/receipts.html · 수정은 원본에서 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>찍으면 끝 — 영수증 보관함</title>
<style>
/* ============================================================
   SK 룩앤필 공통 토큰 — "찍으면 끝" 모바일/PC 공용
   SK CI: SK Red #EA002C · SK Orange #F47725 (행복날개)
   차트 카테고리 팔레트는 dataviz 검증 통과본 (light/dark PASS):
   #EA002C, #2563EB, #D96414, #0E9F6E, #8B5CF6
   ============================================================ */
:root {
  --sk-red: #EA002C;
  --sk-red-dark: #C50025;
  --sk-orange: #F47725;
  --sk-orange-deep: #D96414;
  --sk-grad: linear-gradient(135deg, #EA002C 0%, #F47725 100%);

  /* 잉크/서피스 */
  --ink: #1A1C22;
  --ink-2: #4B5160;
  --ink-3: #8A90A0;
  --surface: #F5F6F8;
  --card: #FFFFFF;
  --line: #E6E8EE;

  /* 상태 (상태색은 시리즈색으로 재사용하지 않음) */
  --ok: #0E9F6E;
  --warn: #B45309;
  --danger: #D80028;
  --ok-bg: #E7F6EF;
  --warn-bg: #FDF3E3;
  --danger-bg: #FDE8EC;

  /* 카테고리(계정과목) — 엔티티 고정 매핑, 순환 금지 */
  --c-travel-meal: #EA002C;      /* 출장-식대 */
  --c-travel-transport: #2563EB; /* 출장-교통 */
  --c-welfare-ai: #D96414;       /* 복지-AI구독 */
  --c-snack: #0E9F6E;            /* 간식비 */
  --c-etc: #8B5CF6;              /* 판관비·기타 */

  --radius: 14px;
  --shadow: 0 1px 3px rgba(26,28,34,.06), 0 4px 14px rgba(26,28,34,.05);
  --font: "Pretendard", "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
}
button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* ---- SK 윙 로고 (행복날개 모티프) ---- */
.sk-logo { display: inline-flex; align-items: center; gap: 8px; }
.sk-logo svg { display: block; }
.sk-logo .brand { font-weight: 800; letter-spacing: -.02em; }
.sk-logo .brand em { font-style: normal; color: var(--sk-red); }

/* ---- 카드 ---- */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
}
.card + .card { margin-top: 12px; }
.card-title {
  font-size: 13px; font-weight: 700; color: var(--ink-2);
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; letter-spacing: -.01em;
}
.card-title .more { font-size: 12px; color: var(--ink-3); font-weight: 500; }

/* ---- 배지 ---- */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 700; line-height: 1;
  padding: 4px 8px; border-radius: 999px; white-space: nowrap;
}
.badge.ok      { background: var(--ok-bg);     color: #0B7A55; }
.badge.warn    { background: var(--warn-bg);   color: var(--warn); }
.badge.danger  { background: var(--danger-bg); color: var(--danger); }
.badge.info    { background: #E8EFFD;          color: #1D4ED8; }
.badge.neutral { background: #EEF0F4;          color: var(--ink-2); }
.badge.brand   { background: var(--sk-grad);   color: #fff; }

/* 카테고리 도트 — 색+텍스트로 이중 표기 */
.cat { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--ink-2); white-space: nowrap; }
.cat i { width: 8px; height: 8px; border-radius: 3px; flex: 0 0 auto; }

/* ---- 게이지(예산 소진) ---- */
.gauge { margin-top: 6px; }
.gauge .g-head { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--ink-2); margin-bottom: 5px; gap: 8px; }
.gauge .g-head b { color: var(--ink); font-size: 13px; }
.gauge .g-track { height: 8px; background: #ECEEF3; border-radius: 999px; overflow: hidden; position: relative; }
.gauge .g-fill  { height: 100%; border-radius: 999px; background: var(--sk-grad); min-width: 4px; transition: width .6s ease; }
.gauge.over .g-fill { background: var(--danger); }
.gauge .g-foot { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-3); margin-top: 4px; }

/* ---- 버튼 ---- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  border: 1px solid var(--line); background: var(--card); color: var(--ink);
  font-size: 14px; font-weight: 700; border-radius: 12px; padding: 11px 16px;
}
.btn:active { transform: scale(.98); }
.btn.primary { background: var(--sk-grad); border: none; color: #fff; box-shadow: 0 4px 12px rgba(234,0,44,.25); }
.btn.ghost { background: transparent; }
.btn.sm { padding: 7px 12px; font-size: 12.5px; border-radius: 9px; }
.btn.block { width: 100%; }
.btn:disabled { opacity: .45; cursor: default; }

/* ---- 칩 (필터/프리셋) ---- */
.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  border: 1px solid var(--line); background: var(--card); color: var(--ink-2);
  font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 999px;
}
.chip.on { background: #1A1C22; border-color: #1A1C22; color: #fff; }
.chip.on.brand { background: var(--sk-grad); border-color: transparent; }

/* ---- 폼 ---- */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; font-weight: 700; color: var(--ink-2); margin-bottom: 5px; }
.field input, .field select {
  width: 100%; border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 12px; font-size: 14px; background: var(--card); color: var(--ink);
}
.field input:focus, .field select:focus { outline: 2px solid rgba(234,0,44,.25); border-color: var(--sk-red); }
.field .hint { font-size: 11.5px; color: var(--ink-3); margin-top: 4px; }

/* ---- 공용 리스트 행 ---- */
.rcpt-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line); }
.rcpt-row:last-child { border-bottom: none; }
.rcpt-thumb {
  width: 42px; height: 42px; border-radius: 10px; flex: 0 0 auto;
  background: #EEF0F4; display: flex; align-items: center; justify-content: center;
  font-size: 18px; overflow: hidden; border: 1px solid var(--line);
}
.rcpt-thumb img { width: 100%; height: 100%; object-fit: cover; }
.rcpt-main { flex: 1; min-width: 0; }
.rcpt-main .m1 { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rcpt-main .m2 { font-size: 11.5px; color: var(--ink-3); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.rcpt-amt { text-align: right; flex: 0 0 auto; }
.rcpt-amt .a1 { font-size: 14px; font-weight: 800; }
.rcpt-amt .a2 { font-size: 11px; color: var(--ink-3); }

/* ---- 툴팁 (차트 호버) ---- */
.viz-tip {
  position: fixed; z-index: 90; pointer-events: none; display: none;
  background: #1A1C22; color: #fff; font-size: 12px; line-height: 1.45;
  padding: 8px 10px; border-radius: 8px; box-shadow: 0 6px 18px rgba(0,0,0,.25);
  max-width: 240px;
}
.viz-tip b { font-size: 12.5px; }
.viz-tip .tl { color: #C6CAD4; }

.muted { color: var(--ink-3); font-size: 12px; }
.num { font-variant-numeric: tabular-nums; }

</style>
<style>
/* ============================================================
   모바일 앱 크롬 — 찍으면 끝 (SK 룩앤필)
   폰 화면 기준, 데스크톱에서 보면 430px 프레임으로 중앙 정렬
   ============================================================ */
body.mobile { background: #FFFFFF; } /* 여백은 도화지처럼 흰색 */
.app {
  max-width: 430px; min-height: 100dvh; margin: 0 auto;
  background: var(--surface);
  display: flex; flex-direction: column;
  position: relative;
}

/* ---- 데스크톱에서는 휴대폰 프레임으로 표시 (반응형) ---- */
@media (min-width: 501px) {
  body.mobile { padding: 28px 0; }
  .app {
    width: 390px; max-width: 390px;
    height: min(844px, calc(100vh - 56px)); min-height: 0;
    border-radius: 34px; border: 1px solid var(--line);
    box-shadow: 0 24px 60px rgba(26,28,34,.18), 0 0 0 8px #1A1C22, 0 0 0 9px #3A3D46;
    overflow-y: auto; overflow-x: hidden;
    scrollbar-width: none;
  }
  .app::-webkit-scrollbar { display: none; }
  /* 프레임 안에서는 탭바가 프레임 하단에 고정 (뒤에 오는 기본 규칙보다 우선하도록 셀렉터 강화) */
  body.mobile .app .tabbar {
    position: sticky; bottom: 0; left: auto; transform: none;
    width: 100%; max-width: none; margin-top: auto;
    border-radius: 0 0 33px 33px;
    padding-bottom: 12px;
  }
  body.mobile .app .app-body { padding-bottom: 20px; }
}

/* ---- 상단 헤더 ---- */
.app-head {
  background: var(--sk-grad);
  color: #fff;
  padding: 14px 18px 16px;
  position: sticky; top: 0; z-index: 20;
}
.app-head .row1 { display: flex; align-items: center; justify-content: space-between; }
.app-head .brand { font-size: 17px; font-weight: 800; letter-spacing: -.02em; display: flex; align-items: center; gap: 7px; }
.app-head .who { font-size: 11.5px; opacity: .85; text-align: right; line-height: 1.3; }
.app-head .sub { font-size: 12px; opacity: .9; margin-top: 2px; }

/* ---- 본문 ---- */
.app-body { flex: 1; padding: 14px 14px 96px; }
.section-title { font-size: 13px; font-weight: 800; color: var(--ink-2); margin: 18px 2px 8px; display: flex; justify-content: space-between; align-items: center; }
.section-title:first-child { margin-top: 2px; }

/* ---- 하단 탭바 ---- */
.tabbar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; z-index: 30;
  background: rgba(255,255,255,.96); backdrop-filter: blur(8px);
  border-top: 1px solid var(--line);
  display: grid; grid-template-columns: repeat(4, 1fr);
  padding: 6px 8px calc(10px + env(safe-area-inset-bottom));
}
.tabbar a {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 10.5px; font-weight: 700; color: var(--ink-3); padding: 5px 0;
}
.tabbar a svg { width: 22px; height: 22px; }
.tabbar a.on { color: var(--sk-red); }
.tabbar a .cam-fab {
  width: 44px; height: 44px; border-radius: 50%; margin-top: -22px;
  background: var(--sk-grad); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 16px rgba(234,0,44,.35); border: 3px solid #fff;
}
.tabbar a .cam-fab svg { width: 20px; height: 20px; }

/* ---- 홈 대시보드 전용 ---- */
.hero {
  background: linear-gradient(160deg, #EA002C 0%, #F0512B 55%, #F47725 100%);
  border-radius: 18px; color: #fff; padding: 18px 16px 16px;
  box-shadow: 0 8px 24px rgba(234,0,44,.28);
  position: relative; overflow: hidden;
}
.hero::after {
  content: ""; position: absolute; right: -30px; top: -40px; width: 160px; height: 160px;
  background: rgba(255,255,255,.10); border-radius: 50%;
}
.hero .h-label { font-size: 12px; opacity: .9; font-weight: 600; }
.hero .h-amount { font-size: 30px; font-weight: 800; letter-spacing: -.02em; margin: 2px 0 4px; }
.hero .h-sub { font-size: 12px; opacity: .92; }
.hero .g-track { background: rgba(255,255,255,.28); }
.hero .g-fill { background: #fff; }
.hero .gauge .g-head, .hero .gauge .g-foot { color: rgba(255,255,255,.9); }
.hero .gauge .g-head b { color: #fff; }

.kpi2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.kpi2 .card { padding: 12px 14px; margin: 0; }
.kpi2 .k-label { font-size: 11px; color: var(--ink-3); font-weight: 700; }
.kpi2 .k-val { font-size: 18px; font-weight: 800; margin-top: 2px; }
.kpi2 .k-sub { font-size: 11px; color: var(--ink-3); margin-top: 1px; }

/* ---- 촬영 화면 ---- */
.cam-stage {
  background: #14161B; border-radius: 18px; overflow: hidden; position: relative;
  aspect-ratio: 3 / 4.1; display: flex; align-items: center; justify-content: center;
}
.cam-stage img.shot { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #14161B; }
.cam-guide {
  position: absolute; inset: 26px 30px; border-radius: 12px; pointer-events: none;
  box-shadow: 0 0 0 999px rgba(10,12,16,.45);
}
.cam-guide i { position: absolute; width: 26px; height: 26px; border: 3px solid #F47725; }
.cam-guide i:nth-child(1) { left: -2px; top: -2px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
.cam-guide i:nth-child(2) { right: -2px; top: -2px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
.cam-guide i:nth-child(3) { left: -2px; bottom: -2px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
.cam-guide i:nth-child(4) { right: -2px; bottom: -2px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }
.cam-msg {
  position: absolute; left: 0; right: 0; bottom: 18px; text-align: center;
  color: #fff; font-size: 12.5px; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.scanline {
  position: absolute; left: 8%; right: 8%; height: 3px; border-radius: 3px;
  background: linear-gradient(90deg, transparent, #F47725, transparent);
  animation: scan 1.5s ease-in-out infinite; display: none;
}
@keyframes scan { 0% { top: 12%; } 50% { top: 84%; } 100% { top: 12%; } }
.cam-controls { display: flex; align-items: center; justify-content: space-around; padding: 16px 10px 4px; }
.shutter {
  width: 66px; height: 66px; border-radius: 50%; border: 4px solid #fff;
  background: var(--sk-grad); box-shadow: 0 0 0 3px rgba(234,0,44,.35), 0 6px 18px rgba(234,0,44,.35);
}
.cam-side { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: var(--ink-2); background: none; border: none; }
.cam-side .ic {
  width: 46px; height: 46px; border-radius: 14px; background: var(--card);
  border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 20px;
}

/* OCR 결과 필드 */
.ocr-grid { display: grid; grid-template-columns: 88px 1fr; row-gap: 9px; font-size: 13.5px; }
.ocr-grid dt { color: var(--ink-3); font-weight: 600; font-size: 12.5px; }
.ocr-grid dd { font-weight: 700; }
.preset-why {
  margin-top: 10px; background: #FFF6EF; border: 1px solid #F8D9BC;
  border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #8A4A12; line-height: 1.55;
}

/* ---- 일정 관리 ---- */
.trip-card { border-left: 4px solid var(--sk-red); }
.trip-card.foreign { border-left-color: var(--sk-orange-deep); }
.trip-card .t-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.trip-card .t-title { font-size: 15px; font-weight: 800; }
.trip-card .t-route { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
.trip-card .t-meta { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }
.slot-note { font-size: 11.5px; color: var(--ink-3); font-weight: 600; }
.seg { display: grid; grid-template-columns: 1fr 1fr; background: #ECEEF3; border-radius: 11px; padding: 3px; margin-bottom: 12px; }
.seg button { border: none; background: none; padding: 9px 0; font-size: 13px; font-weight: 700; color: var(--ink-3); border-radius: 9px; }
.seg button.on { background: #fff; color: var(--sk-red); box-shadow: 0 1px 4px rgba(26,28,34,.12); }
.form2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 10px; }

/* 리스트 필터 상단 고정 */
.filter-wrap { position: sticky; top: 64px; z-index: 10; background: var(--surface); padding: 8px 0 10px; }

</style>
</head>
<body class="mobile">
<div class="app">
  <header class="app-head"></header>
  <main class="app-body">

    <div class="filter-wrap">
      <div class="chips" id="filterChips"></div>
    </div>

    <section class="card" id="summary" style="padding:12px 16px"></section>
    <section id="list"></section>

  </main>
  <nav class="tabbar"></nav>
</div>

<script>
/* ============================================================

   - 영수증: data_sample/expected/*.json 10건 + 계약서 예시(스시로) 1건
   - 환율: 데모 규칙 USD 1,500 고정 · JPY 9.0 (data_sample/README)

  };

  /* ---- 일정(출장) — 유형별 최대 2건 사전 등록, 건별로 정산 분리 ---- */
  const TRIP_MAX_PER_TYPE = 2;

      startDate: "2026-04-15", endDate: "2026-04-15", members: 1,

    },
    {
      id: "trip_daejeon", type: "domestic", title: "대전 연구원 방문",
      route: ["서울", "대전", "서울"], country: "KR",
      startDate: "2026-07-28", endDate: "2026-07-29", members: 1,
      mealCapPerDayKRW: 35000, capNote: "국내 일일 식대 35,000원 (VAT별도) × 일수",
      status: "planned"

    memo: (tool, who) => `[AI구독료] ${tool}_${who}`
  };

  return { TODAY, USER, CATEGORIES, GROUPS, GROUP_ORDER, TRIPS, TRIP_MAX_PER_TYPE, RECEIPTS, BUDGETS,
    AI_PRESETS, AI_POLICY, CARD_TX, RULES, fmt, krw, money, dateShort, dt,
    tripDays, tripCap, tripSpent, tripAll, groupOf, subOf, groupTotals, activeTrip, valid, imgUrl, attachTip,
    matchBasis, candidatesFor, vatInfo };
})();

</script>
<script>
/* 모바일 공통 크롬(헤더 + 하단 탭바) — 각 화면에서 SKM.chrome("home"|"capture"|"receipts"|"schedule", sub) 호출 */
window.SKM = (function () {
  const WING = `
    <svg width="26" height="20" viewBox="0 0 52 40" aria-hidden="true">
      <ellipse cx="18" cy="20" rx="16" ry="9" transform="rotate(-24 18 20)" fill="#fff" opacity=".95"/>
      <ellipse cx="36" cy="18" rx="13" ry="7" transform="rotate(18 36 18)" fill="#FFD3A6" opacity=".95"/>
    </svg>`;

  const ICONS = {
    home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>',
    camera: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l2-3h6l2 3h3v12H4z"/><circle cx="12" cy="13.5" r="3.5"/></svg>',
    receipts: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12v20l-2-1.5L14 22l-2-1.5L10 22l-2-1.5L6 22z"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>',
    schedule: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>'
  };

  function chrome(active, sub) {
    const D = window.SKD;
    document.querySelector(".app-head").innerHTML = `
      <div class="row1">
        <span class="sk-logo brand" style="color:#fff">${WING}<span>찍으면 <em style="color:#FFE2C7">끝</em></span></span>
        <div class="who">${D.USER.name} · ${D.USER.team}<br>${D.TODAY.replace(/-/g, ".")} 기준</div>
      </div>
      ${sub ? `<div class="sub">${sub}</div>` : ""}`;

    const tabs = [
      ["home", "mobile-index.html", "홈"],
      ["capture", "mobile-capture.html", "촬영"],
      ["receipts", "mobile-receipts.html", "영수증"],
      ["schedule", "mobile-schedule.html", "일정"]
    ];
    document.querySelector(".tabbar").innerHTML = tabs.map(([k, href, label]) => {
      if (k === "capture")
        return `<a href="${href}" class="${active === k ? "on" : ""}"><span class="cam-fab">${ICONS.camera}</span>${label}</a>`;
      return `<a href="${href}" class="${active === k ? "on" : ""}">${ICONS[k]}${label}</a>`;
    }).join("");
  }

  /* 그룹 배지/도트 색 */
  function groupDot(g) {
    const G = window.SKD.GROUPS[g];
    return `<span class="cat"><i style="background:${G.hex}"></i>${G.name}</span>`;
  }

  return { chrome, groupDot, ICONS, WING };
})();

</script>
<script>
const D = SKD;
SKM.chrome("receipts", "촬영·업로드한 영수증이 자동 분류되어 보관됩니다");

let filter = "all";
let expanded = null;      // 후보 선택 패널이 열린 영수증 id
const resolved = {};      // 수동 매칭 결과: id → "tx_xx" | "personal"
const FILTERS = [["all", "전체"], ...D.GROUP_ORDER.map(g => [g, D.GROUPS[g].name]), ["review", "확인 필요"]];

function renderChips() {
  document.getElementById("filterChips").innerHTML = FILTERS.map(([k, label]) =>
    `<button class="chip ${filter === k ? "on brand" : ""}" data-k="${k}">${label}</button>`).join("");
  document.querySelectorAll("#filterChips .chip").forEach(c =>
    c.onclick = () => { filter = c.dataset.k; render(); });
}

function render() {
  renderChips();
  const rows = D.valid().filter(r =>
    filter === "all" ? true : filter === "review" ? r.status === "review" : D.groupOf(r) === filter
  ).sort((a, b) => b.paidAt.localeCompare(a.paidAt));

  const total = rows.reduce((s, r) => s + r.amountKRW, 0);
  document.getElementById("summary").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="muted">${filter === "all" ? "전체" : FILTERS.find(f => f[0] === filter)[1]} ${rows.length}건</span>
      <b class="num" style="font-size:16px">${D.krw(total)}</b>
    </div>`;

  /* 월 단위 그룹 */
  const byMonth = {};
  rows.forEach(r => { const m = r.paidAt.slice(0, 7); (byMonth[m] = byMonth[m] || []).push(r); });

  document.getElementById("list").innerHTML = Object.keys(byMonth).sort().reverse().map(m => `
    <div class="section-title">${m.replace("-", "년 ")}월
      <span class="muted num">${D.krw(byMonth[m].reduce((s, r) => s + r.amountKRW, 0))}</span></div>
    <div class="card" style="padding:4px 16px">
      ${byMonth[m].map(r => {
        const G = D.GROUPS[D.groupOf(r)];
        const t = r.tripId ? D.TRIPS.find(x => x.id === r.tripId) : null;
        const url = D.imgUrl(r.img);
        const isReview = r.status === "review" && !resolved[r.id];
        const stateHtml = resolved[r.id]
          ? (resolved[r.id] === "personal" ? '<span class="badge neutral">개인경비 처리</span>' : '<span class="badge ok">수동 매칭 ✓</span>')
          : r.currency !== "KRW" ? D.money(r)
          : isReview ? '<span class="badge warn">확인 필요 ▾</span>' : "매칭 완료";
        return `
        <div class="rcpt-row" ${isReview ? `data-expand="${r.id}" style="cursor:pointer"` : ""}>
          <div class="rcpt-thumb">${url ? `<img src="${url}" alt="">` : (r.source === "pdf" ? "📄" : "🧾")}</div>
          <div class="rcpt-main">
            <div class="m1">${r.merchant}</div>
            <div class="m2">
              <span class="cat"><i style="background:${G.hex}"></i>${G.name} · ${D.subOf(r)}</span>
              <span>${D.dt(r.paidAt)}</span>
              ${t ? `<span class="badge neutral">${t.title.slice(0, 6)}…</span>` : ""}
            </div>
          </div>
          <div class="rcpt-amt">
            <div class="a1 num">${D.krw(r.amountKRW)}</div>
            <div class="a2">${stateHtml}</div>
          </div>
        </div>
        ${expanded === r.id && isReview ? `
        <div style="background:#FAFBFC;border:1px solid var(--line);border-radius:12px;padding:12px;margin:2px 0 10px">
          <div style="font-size:12px;font-weight:800;color:var(--ink-2);margin-bottom:8px">
            매칭 후보 선택 <span class="muted" style="font-weight:600">— 승인번호 미인식 건, 금액±3% 후보</span></div>
          ${D.candidatesFor(r).map(tx => `
            <button class="btn block cand" data-r="${r.id}" data-tx="${tx.id}"
              style="justify-content:space-between;margin-bottom:6px;font-size:12.5px">
              <span>${tx.merchant} · ${D.dt(tx.approvedAt)}</span>
              <b class="num">${D.krw(tx.amountKRW)}</b>
            </button>`).join("")}
          <button class="btn block cand" data-r="${r.id}" data-tx="personal"
            style="font-size:12.5px;color:var(--ink-3)">해당 승인내역 없음 — 개인경비로 처리</button>
        </div>` : ""}`;
      }).join("")}
    </div>`).join("") || `<p class="muted" style="text-align:center;padding:40px 0">해당 조건의 영수증이 없습니다</p>`;

  document.querySelectorAll("[data-expand]").forEach(el =>
    el.onclick = () => { expanded = expanded === el.dataset.expand ? null : el.dataset.expand; render(); });
  document.querySelectorAll(".cand").forEach(b =>
    b.onclick = (e) => { e.stopPropagation(); resolved[b.dataset.r] = b.dataset.tx; expanded = null; render(); });
}
render();
</script>
</body>
