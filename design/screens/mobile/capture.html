<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>찍으면 끝 — 영수증 촬영</title>
<link rel="stylesheet" href="../../components/sk-theme.css">
<link rel="stylesheet" href="../../components/mobile.css">
</head>
<body class="mobile">
<div class="app">
  <header class="app-head"></header>
  <main class="app-body">

    <!-- 1단계: 카메라 -->
    <section id="stageCam">
      <div class="cam-stage">
        <img class="shot" id="shotImg" alt="" style="display:none">
        <div class="cam-guide"><i></i><i></i><i></i><i></i></div>
        <div class="scanline" id="scanline"></div>
        <div class="cam-msg" id="camMsg">영수증을 프레임 안에 맞춰주세요</div>
      </div>
      <div class="cam-controls">
        <button class="cam-side" id="btnGallery">
          <span class="ic">🖼️</span>갤러리
          <input type="file" id="fileInput" accept="image/*,.pdf" hidden>
        </button>
        <button class="shutter" id="btnShoot" aria-label="촬영"></button>
        <button class="cam-side" id="btnSample"><span class="ic">🧾</span>샘플</button>
      </div>
      <div class="chips" id="sampleChips" style="display:none;margin-top:10px;justify-content:center"></div>
      <p class="muted" style="text-align:center;margin-top:10px">
        촬영하거나 갤러리에서 불러오면 자동 크롭 → OCR → 프리셋 분류까지 자동으로 진행됩니다
      </p>
    </section>

    <!-- 2단계: 인식 결과 -->
    <section id="stageResult" style="display:none">
      <div class="card" style="padding:0;overflow:hidden">
        <div style="background:#14161B;max-height:210px;display:flex;justify-content:center">
          <img id="resultImg" alt="" style="max-height:210px;max-width:100%;object-fit:contain">
          <div id="resultNoImg" style="color:#8A90A0;padding:40px 0;font-size:34px">📄</div>
        </div>
        <div style="padding:14px 16px 16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <span class="badge ok">✓ 자동 크롭 · OCR 완료</span>
            <span class="muted">신뢰도 <b id="conf"></b></span>
          </div>
          <dl class="ocr-grid" id="ocrGrid"></dl>
        </div>
      </div>

      <div class="card">
        <div class="card-title">프리셋 자동 분류 <span class="more">탭해서 변경</span></div>
        <div class="chips" id="catChips"></div>
        <div class="preset-why" id="whyBox"></div>
        <div id="aiPolicyBox"></div>
      </div>

      <div class="card" id="capCard"></div>

      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn block" id="btnRetake">다시 촬영</button>
        <button class="btn primary block" id="btnSave">저장하기</button>
      </div>
    </section>

    <!-- 3단계: 저장 완료 -->
    <section id="stageDone" style="display:none;text-align:center;padding-top:40px">
      <div style="width:76px;height:76px;border-radius:50%;background:var(--ok-bg);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px">✓</div>
      <h2 style="font-size:19px;letter-spacing:-.02em">저장 완료!</h2>
      <p class="muted" id="doneMsg" style="margin:8px 0 24px;line-height:1.6"></p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn" id="btnMore">계속 촬영</button>
        <a class="btn primary" href="receipts.html">보관함 보기</a>
      </div>
    </section>

  </main>
  <nav class="tabbar"></nav>
</div>

<script src="../../components/data.js"></script>
<script src="../../components/mobile.js"></script>
<script>
const D = SKD;
SKM.chrome("capture", "촬영 · 갤러리 업로드 → 자동 크롭 + OCR + 프리셋 분류");

/* 데모용 샘플 (data_sample 실제 이미지 사용) */
const SAMPLES = [
  { key: "paris",  label: "파리크라상 (국내출장)", rid: "r_paris" },
  { key: "ktx",    label: "KTX 승차권 (사전결제)", rid: "r_ktx1" },
  { key: "herman", label: "카페 (근무지·일반)",    rid: "r_herman" },
  { key: "sushi",  label: "스시로 ¥ (해외출장)",   rid: "r_sushi" }
];
let current = null;    // 현재 인식된 영수증 데이터
let picked = null;     // 사용자가 고른 분류 (기본 = 자동 분류)
let aiApplied = false; // AI구독료 정책 적용 여부 (수동 클릭으로만 true)

const $ = (id) => document.getElementById(id);
const show = (stage) => {
  $("stageCam").style.display = stage === "cam" ? "" : "none";
  $("stageResult").style.display = stage === "result" ? "" : "none";
  $("stageDone").style.display = stage === "done" ? "" : "none";
  window.scrollTo(0, 0);
};

/* ---- 카메라 → 스캔 연출 → 결과 ---- */
function runScan(r, imgSrc) {
  current = { ...r }; picked = null; aiApplied = false;
  const shot = $("shotImg");
  if (imgSrc) { shot.src = imgSrc; shot.style.display = ""; } else { shot.style.display = "none"; }
  $("camMsg").textContent = "영수증 인식 중… 자동 크롭 → OCR";
  $("scanline").style.display = "block";
  setTimeout(() => {
    $("scanline").style.display = "none";
    $("camMsg").textContent = "영수증을 프레임 안에 맞춰주세요";
    renderResult(imgSrc);
    show("result");
  }, 1600);
}

function renderResult(imgSrc) {
  const r = current;
  if (imgSrc) { $("resultImg").src = imgSrc; $("resultImg").style.display = ""; $("resultNoImg").style.display = "none"; }
  else { $("resultImg").style.display = "none"; $("resultNoImg").style.display = ""; }
  $("conf").textContent = "93%";
  $("ocrGrid").innerHTML = `
    <dt>가맹점</dt><dd>${r.merchant}</dd>
    <dt>결제금액</dt><dd class="num">${D.money(r)}${r.currency !== "KRW" ? ` <span class="badge info">× ${r.fxRate} = ${D.krw(r.amountKRW)}</span>` : ""}</dd>
    <dt>결제일시</dt><dd>${D.dt(r.paidAt)}</dd>
    ${r.serviceDate && r.serviceDate !== r.paidAt.slice(0, 10)
      ? `<dt>이용일</dt><dd>${D.dateShort(r.serviceDate)} <span class="badge warn">사전결제 — 탑승일 기준 판정</span></dd>` : ""}
    ${(() => { const v = D.vatInfo(r); return v ? `<dt>부가세</dt><dd style="font-size:12px;line-height:1.5">${v.text}<br><span class="badge ${v.warn ? "warn" : "neutral"}">${v.warn ? "⚠ " : ""}${v.badge}</span></dd>` : ""; })()}
    ${r.approvalNo ? `<dt>승인번호</dt><dd class="num">${r.approvalNo} <span class="badge ok">매칭 1순위 키</span></dd>`
      : `<dt>승인번호</dt><dd class="muted" style="font-weight:600">미인식 — 금액+일시${r.cardLast4 ? "+카드 ****" + r.cardLast4 : ""} 폴백 매칭</dd>`}
    <dt>결제수단</dt><dd>법인카드 (SK카드)</dd>`;
  renderChips();
  renderCap();
}

/* 분류 칩: 대분류 자동 판정 + 변경 가능 */
function renderChips() {
  const auto = D.groupOf(current);
  const sel = picked || auto;
  $("catChips").innerHTML = D.GROUP_ORDER.map(g => {
    const G = D.GROUPS[g];
    return `<button class="chip ${sel === g ? "on brand" : ""}" data-g="${g}">
      ${G.name}${g === auto ? " · 자동" : ""}</button>`;
  }).join("");
  $("catChips").querySelectorAll(".chip").forEach(c =>
    c.onclick = () => { picked = c.dataset.g; renderChips(); renderCap(); });

  const trip = current.tripId ? D.TRIPS.find(t => t.id === current.tripId) : null;
  const period = trip ? `${D.dateShort(trip.startDate)}–${D.dateShort(trip.endDate)}` : "";
  $("whyBox").innerHTML = `<b>분류 근거</b> · ${current.why}` +
    (trip ? `<br><b>일정 매칭</b> · 등록된 ${trip.type === "foreign" ? "해외" : "국내"}출장 「${trip.title}」(${period}) 기간 내 결제` : "") +
    ` <br><span style="opacity:.8">세부비목: ${D.subOf(current)}</span>`;
  renderAiPolicy();
}

/* AI구독료 정책: 자동 세팅하지 않고 감지 시 버튼만 강조(추천) — 클릭해야 적용 */
function renderAiPolicy() {
  const box = $("aiPolicyBox");
  const g = picked || D.groupOf(current);
  if (g !== "ai") { box.innerHTML = ""; aiApplied = false; return; }
  const tool = current.merchant.includes("OpenAI") ? "ChatGPT" : current.merchant.includes("Anthropic") ? "Claude" : "AI Tool";
  if (!aiApplied) {
    box.innerHTML = `
      <button class="btn primary block" id="btnAiPolicy" style="margin-top:12px">
        ✨ AI구독료 정책 적용 (추천)</button>
      <p class="muted" style="margin-top:6px;line-height:1.5">AI구독 패턴이 감지되었습니다. 버튼을 누르면 예산부서·계정·고정검토자·적요가 자동으로 채워집니다. <b>자동 적용하지 않습니다</b> — 자기개발비 등 다른 예산으로 정산하는 경우 그대로 저장하세요.</p>`;
    $("btnAiPolicy").onclick = () => { aiApplied = true; renderAiPolicy(); };
  } else {
    const P = D.AI_POLICY;
    box.innerHTML = `
      <div class="preset-why" style="background:var(--ok-bg);border-color:#B5E3D0;color:#0B7A55;margin-top:12px">
        ✓ <b>AI구독료 정책 적용됨</b><br>
        예산부서 <b>${P.budgetDept}</b> · 계정 <b>${P.account}</b><br>
        고정검토자 <b>${P.reviewer}</b><br>
        적요 <b>${P.memo(tool, D.USER.name)}</b>
        <button class="btn sm block" id="btnAiUndo" style="margin-top:8px">적용 취소</button>
      </div>`;
    $("btnAiUndo").onclick = () => { aiApplied = false; renderAiPolicy(); };
  }
}

/* 한도 미리보기 */
function renderCap() {
  const g = picked || D.groupOf(current);
  let html = `<div class="card-title">한도 확인</div>`;
  const trip = current.tripId ? D.TRIPS.find(t => t.id === current.tripId) : null;

  if ((g === "domestic" || g === "foreign") && trip) {
    const cap = D.tripCap(trip);
    const others = D.tripSpent(trip) - (current.category === "TRAVEL_MEAL" || trip.type === "foreign" ? current.amountKRW : 0);
    const after = others + current.amountKRW;
    const counted = trip.type === "domestic" ? current.category === "TRAVEL_MEAL" : true;
    if (counted) {
      const over = after > cap;
      html += `<div class="gauge ${over ? "over" : ""}">
        <div class="g-head"><span>${trip.title}</span><b class="num">${D.krw(after)} / ${D.krw(cap)}</b></div>
        <div class="g-track"><div class="g-fill" style="width:${Math.min(100, after / cap * 100)}%"></div></div>
        <div class="g-foot"><span>이 건 포함 시</span>
          <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "기준 초과" : "기준 이내 ✓ 잔여 " + D.krw(cap - after)}</span></div></div>`;
    } else {
      html += `<p class="muted">교통·숙박은 실비 정산 항목입니다 (식대 한도 미차감)</p>`;
    }
  } else if (g === "ai") {
    const b = D.BUDGETS[0], after = b.usedKRW;
    const over = after > b.limitKRW;
    html += `<div class="gauge ${over ? "over" : ""}">
      <div class="g-head"><span>${b.label}</span><b class="num">${D.krw(after)} / ${D.krw(b.limitKRW)}</b></div>
      <div class="g-track"><div class="g-fill" style="width:${Math.min(100, after / b.limitKRW * 100)}%"></div></div>
      <div class="g-foot"><span>제도별 상한: DIY100 100만(VAT별도) · 부서 15만 · 연구 50만</span>
        <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "⚠ 한도 초과" : "한도 이내"}</span></div></div>`;
  } else {
    html += `<p class="muted">일반경비 — 별도 한도 기준이 없는 항목입니다. 전결규정에 따라 결재라인이 자동 지정됩니다.</p>`;
  }
  $("capCard").innerHTML = html;
}

/* ---- 이벤트 ---- */
$("btnShoot").onclick = () => {           // 촬영 = 데모 기본 샘플(파리크라상)
  const r = D.RECEIPTS.find(x => x.id === "r_paris");
  runScan(r, D.imgUrl(r.img));
};
$("btnSample").onclick = () => {
  const box = $("sampleChips");
  box.style.display = box.style.display === "none" ? "flex" : "none";
  box.innerHTML = SAMPLES.map(s => `<button class="chip" data-rid="${s.rid}">${s.label}</button>`).join("");
  box.querySelectorAll(".chip").forEach(c => c.onclick = () => {
    const r = D.RECEIPTS.find(x => x.id === c.dataset.rid);
    box.style.display = "none";
    runScan(r, D.imgUrl(r.img));
  });
};
$("btnGallery").onclick = () => $("fileInput").click();
$("fileInput").onchange = (e) => {        // 실제 파일 미리보기 + OCR 시뮬레이션
  const f = e.target.files[0];
  if (!f) return;
  const r = D.RECEIPTS.find(x => x.id === "r_paris");
  if (f.type.startsWith("image/")) {
    const url = URL.createObjectURL(f);
    runScan({ ...r, merchant: r.merchant + " (업로드)", why: "갤러리 업로드 — 데모에서는 샘플 OCR 결과로 시뮬레이션됩니다" }, url);
  } else {
    const pdf = D.RECEIPTS.find(x => x.id === "r_gpt");
    runScan({ ...pdf, why: "PDF는 텍스트 파싱 경로로 처리됩니다 — " + pdf.why }, null);
  }
};
$("btnRetake").onclick = () => show("cam");
$("btnMore").onclick = () => show("cam");
$("btnSave").onclick = () => {
  const g = picked || D.groupOf(current);
  $("doneMsg").innerHTML = `<b>${current.merchant}</b> · ${D.krw(current.amountKRW)}<br>
    ${D.GROUPS[g].name} › ${D.subOf(current)} 으로 보관함에 저장되었습니다.<br>정산 시 카드승인내역과 자동 매칭됩니다.`;
  show("done");
};
</script>
</body>
</html>
