<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>전표자동화 데모 · 접속 포털</title>
  <style>
    :root {
      --navy: #262b40;
      --navy-2: #2b3152;
      --pink: #ee3d6d;
      --pink-grad: linear-gradient(120deg, #f46e9c, #d955a4);
      --bg: #eef0f4;
      --panel: #ffffff;
      --line: #d9dee6;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", -apple-system, "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    header { text-align: center; margin-bottom: 40px; }
    .brand {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; letter-spacing: .02em;
      color: #fff; background: var(--navy);
      padding: 8px 16px; border-radius: 999px; margin-bottom: 20px;
    }
    .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pink); }
    h1 { font-size: 28px; margin: 0 0 10px; font-weight: 800; }
    header p { margin: 0; color: var(--muted); font-size: 15px; }
    .cards {
      display: grid; gap: 20px; width: 100%; max-width: 620px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (max-width: 720px) { .cards { grid-template-columns: 1fr; max-width: 420px; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 1px 2px rgba(38,43,64,.04);
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(38,43,64,.14);
      border-color: var(--pink);
    }
    .icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; background: #f3f4f8;
    }
    .card h2 { margin: 0; font-size: 19px; font-weight: 800; }
    .card .desc { margin: 0; color: var(--muted); font-size: 13.5px; line-height: 1.55; flex: 1; }
    .card .go {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: var(--pink);
    }
    .card.primary .icon { background: var(--pink-grad); color: #fff; }
    footer { margin-top: 40px; color: #9aa1ad; font-size: 12.5px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span class="dot"></span>전표 자동화 데모</div>
    <h1>접속 포털</h1>
    <p>영수증 촬영부터 전표 상신까지, 경비 정산을 한 번에. PC에서는 이어카운팅 <b>간편정산</b> 메뉴를 이용하세요.</p>
  </header>

  <main class="cards">
    <a class="card primary" href="/eaccounting/" target="_blank" rel="noopener">
      <div class="icon">💳</div>
      <h2>이어카운팅 (AXE-acc)</h2>
      <p class="desc">법인카드 정산·전표 작성·예산 조회·출장비 결재까지. 영수증만 촬영하면 카드내역과 자동 매칭되어 전표가 완성되는 <b>간편정산</b>을 만나보세요.</p>
      <span class="go">바로가기 →</span>
    </a>

    <a class="card" href="/app/" target="_blank" rel="noopener">
      <div class="icon">📱</div>
      <h2>모바일웹</h2>
      <p class="desc">영수증을 촬영·업로드하면 금액과 가맹점을 자동으로 인식합니다. 출장지·현장에서 바로 등록하고, 정산은 PC에서 이어서 처리하세요.</p>
      <span class="go">바로가기 →</span>
    </a>
  </main>

  <footer>© 2026 이어카운팅 · 전표 자동화 서비스</footer>
</body>
</html>
