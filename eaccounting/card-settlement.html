<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>e-Accounting - 법인카드 정산</title>
<link rel="stylesheet" href="css/common.css">
<style>
/* [일반 정산 | 정산단위 정산] 토글 (sot/02 정산 방식 선택) */
.seg { display:inline-flex; border:1px solid #c6ccd6; border-radius:6px; overflow:hidden; background:#fff; }
.seg button { height:34px; padding:0 18px; border:none; background:#fff; font-size:13px; color:#555; cursor:pointer; }
.seg button + button { border-left:1px solid #c6ccd6; }
.seg button.on { background:var(--pink, #e6007e); color:#fff; font-weight:700; }
.preset-bar { display:none; align-items:center; gap:10px; }
.preset-bar select { height:34px; min-width:240px; border:1px solid #c6ccd6; border-radius:5px; padding:0 8px; font-size:13px; }
.preset-summary { font-size:13px; color:#555; }
</style>
</head>
<body>

<div id="gnb"></div>

<div class="layout">
  <aside id="snb" class="snb"></aside>

  <main class="content">
    <div id="breadcrumb" class="breadcrumb"></div>
    <h2 class="page-title">법인카드 정산 <span class="fav">★</span></h2>

    <!-- 정산 방식 선택: 일반(낱개 선택) | 정산단위(배정된 정산단위로 태깅된 미정산 건 자동 필터·선택) -->
    <div style="display:flex; align-items:center; gap:14px; margin:0 0 14px;">
      <div class="seg">
        <button type="button" id="seg-normal" class="on" onclick="setMode('normal')">일반 정산</button>
        <button type="button" id="seg-preset" onclick="setMode('preset')">정산단위 정산</button>
      </div>
      <div class="preset-bar" id="preset-bar">
        <select id="preset-select" onchange="applyPresetFilter()"><option value="">정산단위 선택</option></select>
        <span class="preset-summary" id="preset-summary"></span>
      </div>
    </div>

    <!-- 검색 필터 (안내문 포함) -->
    <div class="filter-box" style="display:block;">
      <div style="display:flex; align-items:center; gap:20px;">
      <div class="filter-grid">
        <div class="field">
          <label>사용일자</label>
          <div class="ctrl">
            <input type="date" value="2025-07-01"> <span>~</span> <input type="date" value="2026-07-22">
          </div>
        </div>
        <div class="field"><label>승인번호</label><div class="ctrl"><input type="text" id="f-apprno"></div></div>
        <div class="field"><label>진행상태</label><div class="ctrl">
          <select id="f-status"><option value="">전체</option><option>미정산</option><option>정산완료</option></select>
        </div></div>

        <div class="field"><label>회사구분</label><div class="ctrl">
          <select><option>SKㅇㅇ - A000</option></select>
        </div></div>
        <div class="field"><label>사용자명/사번</label><div class="ctrl"><input type="text" id="f-owner"></div></div>
        <div class="field"><label>가맹점</label><div class="ctrl"><input type="text" id="f-merchant"></div></div>
      </div>
      <button class="btn-search" onclick="applyFilter()">조회</button>
      </div>
      <div class="notice-bar" style="margin-top:14px;"><span class="i">i</span>취소된 카드내역도 모두 정산이 필요합니다 정산시 결제취소건 모두 부가세없음에 체크하여 주시기 바랍니다.</div>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <button class="btn btn-dark" onclick="createVoucher()">✎ 전표작성</button>
      <button class="btn btn-pink" onclick="openVoucherPreview()">🧾 미리보기(기안)</button>
      <button class="btn btn-line" onclick="applyFilter()">🔍 카드검색</button>
      <button class="btn btn-line" onclick="alert('데모 버전에서는 엑셀다운로드를 지원하지 않습니다.')"><span class="xls">▦</span> 엑셀다운로드</button>
    </div>

    <!-- 목록 -->
    <div class="table-wrap">
      <table class="grid">
        <colgroup>
          <col style="width:44px"><col style="width:36px"><col style="width:92px"><col style="width:150px">
          <col style="width:210px"><col style="width:110px"><col style="width:100px"><col style="width:80px">
          <col style="width:130px"><col style="width:150px"><col style="width:90px"><col style="width:80px"><col style="width:80px">
        </colgroup>
        <thead>
          <tr>
            <th>No.</th><th><input type="checkbox" id="chk-all" onclick="toggleAll(this)"></th>
            <th>사용일자</th><th>결재일시</th><th>가맹점상호</th><th>업종</th><th>사용금액</th>
            <th>카드소유자</th><th>부서</th><th>카드번호</th><th>승인번호</th><th>진행상태</th><th>등록자</th>
          </tr>
        </thead>
        <tbody id="tx-body"></tbody>
      </table>
    </div>

    <div class="table-foot">
      <div class="total">Total : <b id="total">0</b></div>
      <div class="pagination">
        <button>«</button><button>‹</button><button class="cur">1</button><button>›</button><button>»</button>
      </div>
      <div class="psize"><select><option>100</option><option>50</option><option>20</option></select></div>
    </div>
  </main>
</div>

<script src="js/layout.js"></script>
<script src="js/card-data.js"></script>
<script>
renderChrome({
  top: '법인카드',
  active: '법인카드 정산',
  breadcrumb: ['메뉴', '법인카드', '법인카드 정산'],
});

let ALL = [];          // 화면에 뿌릴 전체 행 (API 성공 시 서버 데이터, 실패 시 내장 목데이터)
let view = [];
let apiMode = false;   // true면 전표작성이 실제 서버에 상신된다

/* 서버 스키마(docs/02 CardTransaction) → 이 화면의 컬럼으로 변환 */
function guessBiz(m) {
  if (/호텔|HOTEL/i.test(m)) return '호텔';
  if (/택시|메트로|스카이라이너|철도|공항/i.test(m)) return '교통';
  if (/GS25|CU |편의점/i.test(m)) return '편의점';
  if (/ANTHROPIC|OPENAI|GITHUB|CURSOR/i.test(m)) return '컴퓨터소프트웨어';
  if (/문고|서점/i.test(m)) return '서적';
  if (/STARBUCKS|카페|커피/i.test(m)) return '커피숍';
  return '일반음식점';
}
function adaptTx(t, i) {
  // approvedAt은 +09:00(KST) 문자열 — 보는 PC의 시간대와 무관하게 그대로 표시
  const useDate = t.approvedAt.slice(0, 10).replaceAll('-', '.');
  return {
    id: t.id,
    useDate,
    payAt: `${useDate} ${t.approvedAt.slice(11, 19)}`,
    merchant: t.merchant + (t.currency !== 'KRW' ? ` (${t.currency} ${t.amount.toLocaleString()})` : ''),
    biz: t.biz || guessBiz(t.merchant),
    amount: t.amountKRW,
    owner: '홍길동', dept: '전력사업기획팀',
    cardNo: t.cardLast4 === '1234' ? '4025961080291234' : '4025961080293059',
    apprNo: t.apprNo || String(45125 + i * 52371).padStart(8, '0'),
    status: t.status === 'vouchered' ? '정산완료' : '미정산',
    registrant: t.status === 'vouchered' ? '홍길동' : '',
  };
}

async function load() {
  const txs = await eaccApi('/api/transactions');
  apiMode = Array.isArray(txs);
  ALL = apiMode ? txs.map(adaptTx) : CARD_TXNS.map(t => ({ ...t, id: t.apprNo }));
  view = ALL.slice();
  renderTable();
}

function renderTable() {
  const body = document.getElementById('tx-body');
  body.innerHTML = view.map((t, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><input type="checkbox" class="row-chk" value="${t.id}"></td>
      <td>${t.useDate}</td>
      <td>${t.payAt}</td>
      <td>${t.merchant}</td>
      <td>${t.biz}</td>
      <td class="r">${t.amount.toLocaleString('ko-KR')}</td>
      <td>${t.owner}</td>
      <td>${t.dept}</td>
      <td>${t.cardNo}</td>
      <td>${t.apprNo}</td>
      <td class="${t.status === '미정산' ? 'state-red' : ''}">${t.status}</td>
      <td>${t.registrant}</td>
    </tr>`).join('')
    + `<tr class="empty-pad"><td colspan="13"></td></tr>`;
  document.getElementById('total').textContent = view.length;
  document.getElementById('chk-all').checked = false;
}

function applyFilter() {
  const apprno = document.getElementById('f-apprno').value.trim();
  const status = document.getElementById('f-status').value;
  const owner = document.getElementById('f-owner').value.trim();
  const merchant = document.getElementById('f-merchant').value.trim();
  view = ALL.filter(t =>
    (!apprno || t.apprNo.includes(apprno)) &&
    (!status || t.status === status) &&
    (!owner || t.owner.includes(owner)) &&
    (!merchant || t.merchant.toLowerCase().includes(merchant.toLowerCase()))
  );
  renderTable();
}

function toggleAll(master) {
  document.querySelectorAll('.row-chk').forEach(c => { c.checked = master.checked; });
}

/* ── 정산 방식: 일반 정산 | 정산단위 정산 (sot/02·03 — 신규 API 없이 receipt.presetId 클라이언트 필터) ── */
let mode = 'normal';
let PRESETS = [];              // 활성 정산단위 목록
let receiptByTx = new Map();   // txId → 매칭된 영수증 (presetId 태깅 확인용)

async function setMode(m) {
  document.getElementById('seg-normal').classList.toggle('on', m === 'normal');
  document.getElementById('seg-preset').classList.toggle('on', m === 'preset');
  const bar = document.getElementById('preset-bar');
  if (m === 'normal') {
    mode = m;
    bar.style.display = 'none';
    view = ALL.slice();
    renderTable();
    return;
  }
  if (!apiMode) {
    alert('정산단위 정산은 서버 연결이 필요합니다. (영수증 태깅 정보를 서버에서 읽어옵니다)');
    setMode('normal');
    return;
  }
  mode = m;
  bar.style.display = 'flex';
  if (!PRESETS.length) {
    const [presets, receipts] = await Promise.all([
      eaccApi('/api/presets?active=true'),
      eaccApi('/api/receipts'),
    ]);
    PRESETS = Array.isArray(presets) ? presets : [];
    receiptByTx = new Map((Array.isArray(receipts) ? receipts : [])
      .filter(r => r.matchedTxId).map(r => [r.matchedTxId, r]));
    document.getElementById('preset-select').innerHTML =
      '<option value="">정산단위 선택</option>' +
      PRESETS.map(p => `<option value="${p.id}">[${p.type === 'TRIP' ? '출장' : '상시'}] ${p.name}</option>`).join('');
  }
  applyPresetFilter();
}

function applyPresetFilter() {
  const pid = document.getElementById('preset-select').value;
  const sum = document.getElementById('preset-summary');
  if (!pid) { view = []; renderTable(); sum.textContent = '정산단위를 선택하세요.'; return; }
  // 이 정산단위로 태깅된(영수증 presetId 매칭) 미정산 카드내역만 필터
  view = ALL.filter(t => t.status === '미정산' && (receiptByTx.get(t.id) || {}).presetId === pid);
  renderTable();
  document.querySelectorAll('.row-chk').forEach(c => { c.checked = true; });  // 자동 선택
  const total = view.reduce((s, t) => s + t.amount, 0);
  sum.innerHTML = view.length
    ? `<b>${view.length}</b>건 자동 선택 · 합계 <b>${total.toLocaleString('ko-KR')}</b>원`
    : '이 정산단위로 태깅된 미정산 카드내역이 없습니다.';
}

function createVoucher() {
  const checked = [...document.querySelectorAll('.row-chk:checked')].map(c => c.value);
  if (checked.length === 0) { alert('전표를 작성할 카드내역을 선택해 주세요.'); return; }
  // 선택 내역을 들고 전표작성 화면으로 이동 → 거기서 유형 선택 팝업이 먼저 뜬다
  const rows = ALL.filter(t => checked.includes(t.id));
  const preset = mode === 'preset' ? PRESETS.find(p => p.id === document.getElementById('preset-select').value) : null;
  sessionStorage.setItem('voucherDraft', JSON.stringify({
    apiMode, rows,
    presetId: preset ? preset.id : null,     // 정산단위 정산으로 진입 시 전표작성 화면에 배너 표시
    presetName: preset ? preset.name : null,
  }));
  location.href = 'voucher-create.html';
}

function openVoucherPreview() {
  const previewIds = new Set(['tx_001', 'tx_002', 'tx_003', 'tx_004', 'tx_005', 'tx_007']);
  const source = view.length ? view : ALL;
  const ids = source.map(t => t.id).filter(id => previewIds.has(id));
  if (ids.length === 0) {
    alert('미리보기할 카드 이용내역이 없습니다.');
    return;
  }
  const url = `voucher-preview.html?txIds=${encodeURIComponent(ids.join(','))}`;
  window.open(url, 'voucherDraftPreview', 'width=1320,height=900,scrollbars=yes,resizable=yes');
}

load();
</script>
</body>
</html>
