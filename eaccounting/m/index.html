<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AXE-acc 모바일 — 홈</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body class="mobile">
<div class="app">
  <header class="app-head"></header>
  <main class="app-body">

    <!-- PC 증빙보관함 대시보드와 같은 전체 누적 총액 -->
    <section class="hero">
      <div class="h-label" id="heroLabel">등록 지출 총액 (전체 누적)</div>
      <div class="h-amount num" id="heroTotal"></div>
      <div class="h-sub" id="heroSub"></div>
      <div class="gauge" id="heroTrip"></div>
    </section>

    <!-- 촬영 바로가기 -->
    <a class="btn primary block" href="capture.html" style="margin-top:12px">📸 영수증 촬영하기</a>
    <p class="muted" style="margin-top:6px;text-align:center;line-height:1.5">촬영하면 PC AXE-acc와 같은 저장소에 바로 저장됩니다<br>정산·전표 생성은 PC에서 진행하세요</p>

    <!-- 결재 대기 알림 (서버 연결 시) -->
    <div id="docsAlert"></div>

    <!-- 최근 영수증 -->
    <div class="section-title">최근 영수증 <a class="muted" href="receipts.html">전체보기 ›</a></div>
    <section class="card" id="recent" style="padding:4px 16px"></section>

    <!-- 서버 계정과목별 사용 현황 -->
    <div class="section-title">카테고리별 사용 현황 <span class="muted" id="demoTag">서버 실데이터</span></div>
    <section class="card" id="groupCards" style="padding:6px 16px"></section>

    <!-- 출장비 기준 대비 -->
    <div class="section-title">출장비 기준 대비 사용</div>
    <section class="card" id="tripGauges"></section>

  </main>
  <nav class="tabbar"></nav>
</div>

<script src="../js/layout.js"></script>
<script src="../js/quick-data.js"></script>
<script src="js/m-chrome.js"></script>
<script>
const D = SKD;
SKM.chrome("home", "영수증 사진 한 장으로 정산 끝 — AXE-acc 모바일 (PC와 같은 저장소)");
const $ = (id) => document.getElementById(id);

/* ---- 요약·최근·분석: 서버 실데이터 전용 ---- */
(async () => {
  const receipts = await eaccApi("/api/receipts");
  const stats = Array.isArray(receipts) ? await eaccApi("/api/stats") : null;
  if (Array.isArray(receipts)) {
    /* 결재 대기 전표 알림 — 탭하면 문서함으로 */
    eaccApi("/api/vouchers").then(vs => {
      const pending = (vs || []).filter(v => v.status === "submitted").length;
      if (pending) $("docsAlert").innerHTML = `
        <a class="card" href="docs.html" style="display:flex;align-items:center;gap:12px;margin-top:12px;border-left:4px solid var(--sk-orange)">
          <span style="font-size:22px">📑</span>
          <span style="flex:1;font-size:13.5px"><b>결재할 전표 ${pending}건</b><br>
            <span class="muted">문서함에서 바로 결재·반려할 수 있어요</span></span>
          <span style="color:var(--sk-red);font-weight:800">›</span>
        </a>`;
    });
    const total = stats ? stats.totalKRW : receipts.reduce((s, r) => s + (r.amountKRW || 0), 0);
    $("heroTotal").textContent = D.krw(total);
    $("heroSub").textContent = `영수증 ${receipts.length}건 · 매칭 완료 ${receipts.filter(r => r.matchedTxId).length}건 · PC와 동일한 서버 집계`;
    const un = receipts.filter(r => !r.matchedTxId).length;
    $("heroTrip").innerHTML = un
      ? `<div class="g-head"><span>🔗 미매칭 영수증</span><b>${un}건</b></div>
         <div class="g-foot"><span>PC AXE-acc › 증빙보관함 › 자동매칭에서 처리하세요</span></div>`
      : `<div class="g-foot"><span>모든 영수증이 매칭되었습니다 ✓</span></div>`;

    $("recent").innerHTML = receipts.slice()
      .sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).slice(0, 4)
      .map(r => {
        const o = r.ocr || {};
        return `
        <div class="rcpt-row">
          <div class="rcpt-thumb">${r.croppedUrl ? `<img src="${r.croppedUrl}" alt="">` : "🧾"}</div>
          <div class="rcpt-main">
            <div class="m1">${o.merchant || r.id}</div>
            <div class="m2"><span>${o.paidAt ? D.dt(o.paidAt) : ""}</span>
              ${r.matchedTxId ? '<span class="badge ok" style="font-size:10px">매칭</span>' : '<span class="badge neutral" style="font-size:10px">미매칭</span>'}</div>
          </div>
          <div class="rcpt-amt">
            <div class="a1 num">${D.krw(r.amountKRW || 0)}</div>
            <div class="a2">${(o.currency && o.currency !== "KRW") ? o.currency + " 환산" : ""}</div>
          </div>
        </div>`;
      }).join("") || '<p class="muted" style="padding:12px 0">아직 영수증이 없습니다 — 촬영해 보세요</p>';

    const accounts = stats && Array.isArray(stats.byAccount) ? stats.byAccount.filter(a => a.totalKRW > 0) : [];
    const grand = accounts.reduce((sum, a) => sum + a.totalKRW, 0);
    const colors = ["#EA002C", "#2563EB", "#D96414", "#0E9F6E", "#8055E8"];
    $("groupCards").innerHTML = accounts.map((a, i) => `
      <div style="padding:11px 0;border-bottom:1px solid var(--line)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="cat" style="font-size:13px"><i style="background:${colors[i % colors.length]}"></i>${a.name}</span>
          <b class="num" style="font-size:14.5px">${D.krw(a.totalKRW)}</b>
        </div>
        <div class="g-track" style="height:6px;margin:7px 0 6px"><div class="g-fill" style="width:${grand ? a.totalKRW / grand * 100 : 0}%;background:${colors[i % colors.length]}"></div></div>
        <div class="muted" style="font-size:11.5px">${a.count}건 · 서버 계정과목 집계</div>
      </div>`).join("") || '<p class="muted" style="padding:12px 0">분류된 사용 내역이 없습니다.</p>';

    const trips = stats && Array.isArray(stats.presets)
      ? stats.presets.filter(p => p.type === "TRIP" && p.limitKRW)
      : [];
    $("tripGauges").innerHTML = trips.map(p => {
      const pct = Math.min(100, p.usedKRW / p.limitKRW * 100);
      const over = p.usedKRW > p.limitKRW;
      return `<div class="gauge ${over ? "over" : ""}" style="margin-bottom:16px">
        <div class="g-head"><span>✈ <b>${p.name}</b></span><b class="num">${D.krw(p.usedKRW)} / ${D.krw(p.limitKRW)}</b></div>
        <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
        <div class="g-foot"><span>서버 정산단위 한도</span><span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "기준 초과" : "기준 이내 ✓"}</span></div>
      </div>`;
    }).join("") || '<p class="muted" style="padding:12px 0">등록된 출장 정산단위가 없습니다.</p>';
  } else {
    $("heroTotal").textContent = D.krw(0);
    $("heroSub").textContent = "서버 연결 실패 · 샘플 금액으로 대체하지 않음";
    $("heroTrip").innerHTML = '<div class="g-foot"><span>실제 영수증 데이터를 불러오려면 서버 연결이 필요합니다.</span></div>';
    $("recent").innerHTML = '<p class="muted" style="padding:18px 0;text-align:center">실제 영수증 목록을 불러오지 못했습니다.<br>연결을 확인한 뒤 새로고침해 주세요.</p>';
    $("groupCards").innerHTML = '<p class="muted" style="padding:12px 0">서버 연결이 필요합니다.</p>';
    $("tripGauges").innerHTML = '<p class="muted" style="padding:12px 0">서버 연결이 필요합니다.</p>';
  }
})();
</script>
</body>
</html>
