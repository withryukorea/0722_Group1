<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AXE-acc 모바일 — 일정·프리셋</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body class="mobile">
<div class="app">
  <header class="app-head"></header>
  <main class="app-body">
    <div class="seg" id="segBar">
      <button data-s="trips" class="on">일정·프리셋</button>
      <button data-s="budget">예산조회</button>
    </div>
    <div id="content"></div>

    <section class="card" style="background:#FFF9F4;border-color:#F4DCC4;margin-top:14px">
      <div class="card-title" style="color:#8A4A12">💡 출장 일정(프리셋)이 등록되어 있으면</div>
      <ul class="muted" style="padding-left:18px;line-height:1.7;color:#8A4A12">
        <li>기간 내 결제 건이 <b>자동으로 출장비</b>로 추천 분류됩니다</li>
        <li>KTX·항공권은 결제일이 아닌 <b>탑승일(이용일) 기준</b>으로 매칭됩니다</li>
        <li>한도(Cap) 초과 여부를 촬영 즉시 알려드립니다 (경고만, 차단 없음)</li>
      </ul>
    </section>
  </main>
  <nav class="tabbar"></nav>
</div>

<script src="../js/layout.js"></script>
<script src="../js/quick-data.js"></script>
<script src="js/m-chrome.js"></script>
<script>
const D = SKD;
SKM.chrome("schedule", "출장 일정과 정산 프리셋을 확인하세요 (등록·변경은 PC에서)");
const $ = (id) => document.getElementById(id);

/* ── 서버 모드: Preset 조회 전용 (모바일은 확인만, 등록·변경은 PC) ── */
function presetCard(p) {
  const period = p.period ? `${D.dateShort(p.period.start)} ~ ${D.dateShort(p.period.end)}` : "상시";
  const used = (p.usage && p.usage.usedKRW) || 0;
  const limit = p.rules.limitKRW || 0;
  const over = limit && used > limit;
  const pct = limit ? Math.min(100, used / limit * 100) : 0;
  const isTrip = p.type === "TRIP";
  return `
  <div class="card trip-card ${isTrip && p.meta && p.meta.country !== "KR" ? "foreign" : ""}">
    <div class="t-head">
      <div>
        <div class="t-title">${isTrip ? (p.meta && p.meta.country !== "KR" ? "✈" : "🚄") : "⚡"} ${p.name}</div>
        <div class="t-meta">${period}${p.meta && p.meta.destination ? ` · ${p.meta.destination}` : ""}${p.meta && p.meta.members ? ` · ${p.meta.members}명` : ""}</div>
        <div class="t-meta">비목: ${(p.rules.allowedAccountCodes || []).join(", ") || "—"}</div>
      </div>
      <span class="badge ${p.active ? "brand" : "neutral"}">${p.active ? "활성" : "비활성"}</span>
    </div>
    ${limit ? `
    <div class="gauge ${over ? "over" : ""}" style="margin-top:10px">
      <div class="g-head"><span>사용액 (${p.rules.limitPeriod === "daily" ? "일" : p.rules.limitPeriod === "monthly" ? "월" : "기간"} 한도)</span>
        <b class="num">${D.krw(used)} / ${D.krw(limit)}</b></div>
      <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
      <div class="g-foot"><span>상신된 전표만 차감됩니다</span>
        <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "⚠ 한도 초과" : "이내 ✓"}</span></div>
    </div>` : '<p class="muted" style="margin-top:8px">금액 한도가 없는 프리셋입니다</p>'}
    <p class="muted" style="margin-top:8px">전결라인: ${(p.rules.approvalLine || []).join(" → ") || "규정 자동"}</p>
  </div>`;
}

/* 유형별 슬롯: 시제품#1 규칙 — 국내/해외 각 최대 2건 사전 등록 */
const TRIP_MAX_PER_TYPE = 2;
let newType = "domestic";

function serverRender(presets) {
  const trips = presets.filter(p => p.type === "TRIP" && p.active !== false);
  const others = presets.filter(p => p.type !== "TRIP");
  const dom = trips.filter(p => ((p.meta || {}).country || "KR") === "KR");
  const fo  = trips.filter(p => ((p.meta || {}).country || "KR") !== "KR");

  $("content").innerHTML = `
    <div class="section-title">국내출장 일정 <span class="slot-note">${dom.length}/${TRIP_MAX_PER_TYPE}건 · 서버 실데이터</span></div>
    ${dom.map(presetCard).join("") || '<p class="muted" style="padding:6px 2px">등록된 국내출장이 없습니다</p>'}
    <div class="section-title">해외출장 일정 <span class="slot-note">${fo.length}/${TRIP_MAX_PER_TYPE}건</span></div>
    ${fo.map(presetCard).join("") || '<p class="muted" style="padding:6px 2px">등록된 해외출장이 없습니다</p>'}

    <div class="section-title">새 출장 일정 등록 <span class="muted">등록 즉시 TRIP 프리셋 생성</span></div>
    <section class="card">
      <div class="seg" id="typeSeg">
        <button type="button" data-t="domestic" class="${newType === "domestic" ? "on" : ""}">국내출장</button>
        <button type="button" data-t="foreign" class="${newType === "foreign" ? "on" : ""}">해외출장</button>
      </div>
      <div id="slotWarn"></div>
      <form id="tripForm">
        <div class="field"><label>출장명</label><input id="fTitle" placeholder="예: 대전 연구원 방문" required></div>
        <div class="field"><label>경로 (출발지 → 목적지, 복수 지역 가능)</label>
          <input id="fRoute" placeholder="예: 서울 → 부산 → 울산 → 서울" required>
          <div class="hint">경로의 지역명이 영수증 자동추천 키워드로 등록됩니다</div></div>
        <div class="field" id="countryField" style="display:${newType === "foreign" ? "block" : "none"}"><label>국가</label>
          <select id="fCountry"><option value="JP">일본 (JPY)</option><option value="US">미국 (USD)</option><option value="CN">중국 (CNY)</option><option value="EU">유럽 (EUR)</option></select></div>
        <div class="form2">
          <div class="field"><label>시작일</label><input type="date" id="fStart" value="2026-08-03" required></div>
          <div class="field"><label>종료일</label><input type="date" id="fEnd" value="2026-08-05" required></div>
        </div>
        <div class="field"><label>인원</label><select id="fMembers"><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
        <div class="preset-why" id="capPreview">기간을 입력하면 출장비 지급기준(travel-policy)으로 일일 한도가 자동 계산됩니다</div>
        <button type="submit" class="btn primary block" id="btnAdd" style="margin-top:12px">일정 등록</button>
        <p class="muted" id="addMsg" style="margin-top:6px;text-align:center"></p>
      </form>
    </section>

    <div class="section-title">정기·특수 정산 프리셋 <span class="slot-note">${others.length}건</span></div>
    ${others.map(presetCard).join("")}`;

  /* ── 등록 폼 동작 ── */
  const updateSlot = () => {
    const count = (newType === "domestic" ? dom : fo).length;
    const full = count >= TRIP_MAX_PER_TYPE;
    $("btnAdd").disabled = full;
    $("slotWarn").innerHTML = full
      ? `<div class="preset-why" style="background:var(--warn-bg);border-color:#EAD3A8;color:var(--warn);margin:0 0 12px">
          ${newType === "domestic" ? "국내" : "해외"}출장은 <b>최대 ${TRIP_MAX_PER_TYPE}건</b>까지 사전 등록할 수 있습니다.
          완료된 출장 프리셋을 비활성화하면 슬롯이 비워집니다.</div>` : "";
  };
  updateSlot();

  $("typeSeg").querySelectorAll("button").forEach(b => b.onclick = (e) => {
    e.preventDefault();
    newType = b.dataset.t;
    $("typeSeg").querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
    $("countryField").style.display = newType === "foreign" ? "block" : "none";
    capPreview(); updateSlot();
  });
  ["fStart", "fEnd", "fMembers"].forEach(id => $(id).onchange = capPreview);
  capPreview();

  function capPreview() {
    const s = $("fStart").value, e = $("fEnd").value;
    const days = s && e ? Math.max(1, Math.round((new Date(e) - new Date(s)) / 86400000) + 1) : 0;
    const m = +$("fMembers").value;
    if (!days) { $("capPreview").innerHTML = "기간을 입력하면 기준 금액이 자동 계산됩니다"; return; }
    $("capPreview").innerHTML = newType === "domestic"
      ? `<b>기준 자동 계산 (등록 시 확정)</b> · 국내 일당 기준 × ${m}명 × ${days}일 — 서버의 출장비 지급기준(travel-policy)이 일일 한도를 자동 산정합니다`
      : `<b>기준 자동 계산 (등록 시 확정)</b> · 국가별 일일 Cap × ${m}명 × ${days}일 — 현지 통화 결제는 환율 자동 환산 후 차감됩니다`;
  }

  $("tripForm").onsubmit = async (e) => {
    e.preventDefault();
    const route = $("fRoute").value.split("→").map(x => x.trim()).filter(Boolean);
    const body = {
      type: "TRIP",
      name: $("fTitle").value,
      startDate: $("fStart").value, endDate: $("fEnd").value,
      destination: route.length > 1 ? route.slice(1, -1).join("·") || route[route.length - 1] : ($("fRoute").value || $("fTitle").value),
      country: newType === "domestic" ? "KR" : $("fCountry").value,
      members: +$("fMembers").value,
      rules: { matchKeywords: route, descriptionTemplate: `${$("fTitle").value} {merchant}` }
    };
    const res = await eaccApiTry("/api/presets", { body });
    if (res.ok) {
      const lim = res.data && res.data.rules && res.data.rules.limitKRW;
      P = (await eaccApi("/api/presets")) || P;
      S = (await eaccApi("/api/stats")) || S;
      renderSeg();
      const am = $("addMsg");
      if (am) am.textContent = `✓ 등록 완료 — 일일 한도 ${lim ? D.krw(lim) : "자동"} (지급기준 자동 산정)`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      $("addMsg").textContent = "등록 실패: " + ((res.data && (res.data.hint || res.data.error)) || "서버 오류");
    }
  };
}

/* ── 예산조회 (기존 E-acc 예산조회의 모바일판 — /api/stats 실데이터) ── */
function budgetRender(presets, stats) {
  const limited = presets.filter(p => p.rules && p.rules.limitKRW);
  const byAccount = (stats && stats.byAccount) || [];
  const total = (stats && stats.totalKRW) || 0;
  $("content").innerHTML = `
    <div class="section-title">한도·예산 소진 현황 <span class="slot-note">상신 전표만 차감</span></div>
    ${limited.map(p => {
      const used = (p.usage && p.usage.usedKRW) || 0;
      const over = used > p.rules.limitKRW;
      const pct = Math.min(100, used / p.rules.limitKRW * 100);
      return `
      <div class="card">
        <div class="gauge ${over ? "over" : ""}">
          <div class="g-head"><span>${p.type === "TRIP" ? "✈" : "⚡"} ${p.name}</span>
            <b class="num">${D.krw(used)} / ${D.krw(p.rules.limitKRW)}</b></div>
          <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
          <div class="g-foot"><span>${Math.round(pct)}% 소진 (${p.rules.limitPeriod === "daily" ? "일" : p.rules.limitPeriod === "monthly" ? "월" : "기간"} 한도)</span>
            <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "⚠ 초과 " + D.krw(used - p.rules.limitKRW) : "잔여 " + D.krw(p.rules.limitKRW - used)}</span></div>
        </div>
      </div>`;
    }).join("") || '<div class="card"><p class="muted">한도가 설정된 프리셋이 없습니다</p></div>'}

    <div class="section-title">계정과목별 지출 <span class="slot-note num">합계 ${D.krw(total)}</span></div>
    <div class="card" style="padding:6px 16px">
      ${byAccount.map(a => `
      <div style="padding:10px 0;border-bottom:1px solid var(--line)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:600">${a.name} <span class="muted">(${a.count}건)</span></span>
          <b class="num" style="font-size:14px">${D.krw(a.totalKRW)}</b>
        </div>
        <div class="g-track" style="height:5px;margin-top:6px"><div class="g-fill" style="width:${total ? a.totalKRW / total * 100 : 0}%"></div></div>
      </div>`).join("") || '<p class="muted" style="padding:10px 0">등록된 지출이 없습니다</p>'}
    </div>
    <p class="muted" style="margin-top:10px;text-align:center">상세 분석은 <b>PC AXE-acc › 간편정산 › 분석 대시보드</b>에서</p>`;
}

/* ── 폴백: 시제품#1 내장 데모 (조회 전용으로 축약) ── */
function fallbackRender() {
  const STATUS = { active: ["진행중", "brand"], planned: ["예정", "info"], done: ["완료", "neutral"] };
  const card = (t, idx) => {
    const cap = D.tripCap(t), spent = D.tripSpent(t);
    const pct = Math.min(100, spent / cap * 100), over = spent > cap;
    const [sLabel, sClass] = STATUS[t.status];
    const days = D.tripDays(t);
    const capLine = t.type === "domestic"
      ? `식대 ${D.krw(t.mealCapPerDayKRW)}/일 × ${days}일 = <b class="num">${D.krw(cap)}</b> (VAT별도)`
      : `Cap ${D.krw(t.dailyCapPerPersonKRW)}/인 × ${t.members}명 × ${days}일 = <b class="num">${D.krw(cap)}</b>`;
    return `
    <div class="card trip-card ${t.type === "foreign" ? "foreign" : ""}">
      <div class="t-head">
        <div>
          <div class="t-title">${t.type === "domestic" ? "🚄" : "✈"} ${t.title}</div>
          <div class="t-route">${t.route.join(" → ")}</div>
          <div class="t-meta">${D.dateShort(t.startDate)} ~ ${D.dateShort(t.endDate)} (${days}일) · ${t.members}명 · <b>정산단위 #${idx + 1}</b></div>
        </div>
        <span class="badge ${sClass}">${sLabel}</span>
      </div>
      <div class="gauge ${over ? "over" : ""}" style="margin-top:10px">
        <div class="g-head"><span>${t.type === "domestic" ? "식대 사용" : "Cap 사용"}</span>
          <b class="num">${D.krw(spent)} / ${D.krw(cap)}</b></div>
        <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
        <div class="g-foot"><span>${capLine}</span>
          <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">
            ${t.status === "planned" ? "일정 대기" : over ? "기준 초과 " + D.krw(spent - cap) : "기준 이내 ✓"}</span></div>
      </div>
    </div>`;
  };
  const dom = D.TRIPS.filter(t => t.type === "domestic");
  const fo = D.TRIPS.filter(t => t.type === "foreign");
  $("content").innerHTML = `
    <div class="section-title">국내출장 일정 <span class="slot-note">${dom.length}/${D.TRIP_MAX_PER_TYPE}건 (내장 데모)</span></div>
    ${dom.map(card).join("")}
    <div class="section-title">해외출장 일정 <span class="slot-note">${fo.length}/${D.TRIP_MAX_PER_TYPE}건</span></div>
    ${fo.map(card).join("")}
    <div class="section-title">AI Tool 정산 제도 프리셋</div>
    <section class="card">${D.AI_PRESETS.map(p => {
      const over = D.BUDGETS[0].usedKRW > p.capKRW;
      return `<div style="display:flex;justify-content:space-between;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line)">
        <span><b style="font-size:13.5px">${p.name}</b><br><span class="muted">${p.note}</span></span>
        <span class="badge ${over ? "danger" : "ok"}" style="align-self:center">${over ? "초과" : "이내 ✓"}</span></div>`;
    }).join("")}</section>`;
}

let seg = "trips";
let P = null, S = null;
async function boot() {
  P = await eaccApi("/api/presets");
  if (P) S = await eaccApi("/api/stats");
  renderSeg();
}
function renderSeg() {
  document.querySelectorAll("#segBar button").forEach(b =>
    b.classList.toggle("on", b.dataset.s === seg));
  if (!P) { fallbackRender(); return; }
  if (seg === "trips") serverRender(P);
  else budgetRender(P, S);
}
document.querySelectorAll("#segBar button").forEach(b =>
  b.onclick = () => { seg = b.dataset.s; renderSeg(); });
boot();
</script>
</body>
</html>
