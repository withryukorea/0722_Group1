<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AXE-acc 모바일 — 영수증 보관함</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body class="mobile">
<div class="app">
  <header class="app-head"></header>
  <main class="app-body">

    <div class="filter-wrap">
      <div class="chips" id="filterChips"></div>
    </div>

    <section class="card" id="summary" style="padding:12px 16px"></section>
    <section id="list"></section>

  </main>
  <nav class="tabbar"></nav>
</div>

<script src="../js/layout.js"></script>
<script src="../js/quick-data.js"></script>
<script src="js/m-chrome.js"></script>
<script>
const D = SKD;
SKM.chrome("receipts", "촬영·업로드한 영수증이 자동 분류되어 보관됩니다 (PC와 같은 저장소)");
const $ = (id) => document.getElementById(id);

let MODE = "loading";
let SROWS = [];           // 서버 영수증
let STXS = [];            // 서버 카드 승인내역 (수동매칭 후보용)
let filter = "all";
let sExpanded = null;     // 후보 패널이 열린 영수증 id

/* ── 서버 모드 ─────────────────────────────────────────── */
const S_FILTERS = [["all", "전체"], ["matched", "매칭 완료"], ["unmatched", "미매칭"], ["cards", "💳 미정산 카드"]];

/* 수동매칭 후보: 금액 ±3%, 전표 처리 전, 다른 영수증과 미연결 */
function candidatesOf(r) {
  const amt = r.amountKRW || 0;
  return STXS.filter(t => t.status !== "vouchered" && !t.matchedReceiptId
    && Math.abs((t.amountKRW || 0) - amt) <= Math.max(1, amt * 0.03))
    .sort((a, b) => Math.abs(a.amountKRW - amt) - Math.abs(b.amountKRW - amt))
    .slice(0, 4);
}

async function confirmMatch(receiptId, txId) {
  const res = await eaccApiTry("/api/match/confirm", { body: { receiptId, txId } });
  if (res.ok) {
    sExpanded = null;
    SROWS = (await eaccApi("/api/receipts")) || SROWS;
    STXS = (await eaccApi("/api/transactions")) || STXS;
    serverRender();
  } else {
    alert("수동 매칭 실패: " + ((res.data && (res.data.hint || res.data.error)) || "서버 오류"));
  }
}

function serverRender() {
  $("filterChips").innerHTML = S_FILTERS.map(([k, label]) =>
    `<button class="chip ${filter === k ? "on brand" : ""}" data-k="${k}">${label}</button>`).join("");
  document.querySelectorAll("#filterChips .chip").forEach(c =>
    c.onclick = () => { filter = c.dataset.k; serverRender(); });

  /* 💳 미정산 카드내역: 영수증이 아직 연결되지 않은 법인카드 승인 건 (기존 E-acc 법인카드 정산의 모바일 조회판) */
  if (filter === "cards") {
    const um = STXS.filter(t => t.status !== "vouchered" && !t.matchedReceiptId)
      .sort((a, b) => (b.approvedAt || "").localeCompare(a.approvedAt || ""));
    const total = um.reduce((s, t) => s + (t.amountKRW || 0), 0);
    $("summary").innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="muted">영수증 미제출 승인내역 ${um.length}건</span>
        <b class="num" style="font-size:16px">${D.krw(total)}</b>
      </div>`;
    $("list").innerHTML = um.length ? `
      <div class="card" style="padding:4px 16px;margin-top:12px">
        ${um.map(t => `
        <div class="rcpt-row">
          <div class="rcpt-thumb">💳</div>
          <div class="rcpt-main">
            <div class="m1">${t.merchant}</div>
            <div class="m2"><span>${t.approvedAt ? D.dt(t.approvedAt) : ""}</span>${t.approvalNo ? `<span class="muted">승인 ${t.approvalNo}</span>` : ""}</div>
          </div>
          <div class="rcpt-amt">
            <div class="a1 num">${D.krw(t.amountKRW || 0)}</div>
            <div class="a2"><span class="badge warn">영수증 필요</span></div>
          </div>
        </div>`).join("")}
      </div>
      <a class="btn primary block" href="capture.html" style="margin-top:12px">📸 지금 영수증 촬영하기</a>
      <p class="muted" style="margin-top:8px;text-align:center;line-height:1.5">촬영하면 위 승인내역과 자동 매칭됩니다</p>`
      : '<div class="card" style="margin-top:12px"><p class="muted">미정산 승인내역이 없습니다 ✓ 전부 영수증이 연결되었어요</p></div>';
    return;
  }

  const rows = SROWS.filter(r =>
    filter === "all" ? true : filter === "matched" ? !!r.matchedTxId : !r.matchedTxId
  ).sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));

  const total = rows.reduce((s, r) => s + (r.amountKRW || 0), 0);
  $("summary").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="muted">${S_FILTERS.find(f => f[0] === filter)[1]} ${rows.length}건 · 서버 실데이터</span>
      <b class="num" style="font-size:16px">${D.krw(total)}</b>
    </div>`;

  $("list").innerHTML = rows.length ? `
    <div class="card" style="padding:4px 16px;margin-top:12px">
      ${rows.map(r => {
        const o = r.ocr || {};
        const dupWarn = (r.checks || []).some(c => c.type === "DUPLICATE_DOCUMENT");
        const canPick = !r.matchedTxId;
        return `
        <div class="rcpt-row" ${canPick ? `data-expand="${r.id}" style="cursor:pointer"` : ""}>
          <div class="rcpt-thumb">${r.croppedUrl ? `<img src="${r.croppedUrl}" alt="">` : "🧾"}</div>
          <div class="rcpt-main">
            <div class="m1">${o.merchant || r.id}</div>
            <div class="m2">
              <span>${o.paidAt ? D.dt(o.paidAt) : ""}</span>
              ${r.presetId || r.suggestedPresetId ? '<span class="badge brand" style="font-size:10px">⚡ 프리셋</span>' : ""}
              ${dupWarn ? '<span class="badge danger" style="font-size:10px">중복 의심</span>' : ""}
            </div>
          </div>
          <div class="rcpt-amt">
            <div class="a1 num">${D.krw(r.amountKRW || 0)}</div>
            <div class="a2">${r.matchedTxId ? '<span class="badge ok">매칭 완료</span>' : '<span class="badge warn">미매칭 — 후보 선택 ▾</span>'}</div>
          </div>
        </div>
        ${sExpanded === r.id && canPick ? `
        <div style="background:#FAFBFC;border:1px solid var(--line);border-radius:12px;padding:12px;margin:2px 0 10px">
          <div style="font-size:12px;font-weight:800;color:var(--ink-2);margin-bottom:8px">
            매칭 후보 선택 <span class="muted" style="font-weight:600">— 금액 ±3% 승인내역</span></div>
          ${(() => { const cands = candidatesOf(r); return cands.length ? cands.map(tx => `
            <button class="btn block s-cand" data-r="${r.id}" data-tx="${tx.id}"
              style="justify-content:space-between;margin-bottom:6px;font-size:12.5px">
              <span>${tx.merchant} · ${tx.approvedAt ? D.dt(tx.approvedAt) : ""}</span>
              <b class="num">${D.krw(tx.amountKRW)}</b>
            </button>`).join("")
            : '<p class="muted" style="padding:2px 0 8px">±3% 이내 후보가 없습니다 — 개인카드/현금 결제(개인경비)로 추정됩니다</p>'; })()}
        </div>` : ""}`;
      }).join("")}
    </div>
    <p class="muted" style="margin-top:10px;line-height:1.5;text-align:center">미매칭 건을 탭하면 후보를 골라 바로 확정할 수 있어요 · 전표 생성은 <b>PC AXE-acc › 간편정산</b>에서</p>`
    : `<p class="muted" style="text-align:center;padding:40px 0">해당 조건의 영수증이 없습니다 — <a href="capture.html" style="color:var(--sk-red);font-weight:700">촬영하기</a></p>`;

  document.querySelectorAll("[data-expand]").forEach(el =>
    el.onclick = () => { sExpanded = sExpanded === el.dataset.expand ? null : el.dataset.expand; serverRender(); });
  document.querySelectorAll(".s-cand").forEach(b =>
    b.onclick = (e) => { e.stopPropagation(); confirmMatch(b.dataset.r, b.dataset.tx); });
}

/* ── 부팅 ─────────────────────────────────────────────── */
(async () => {
  const list = await eaccApi("/api/receipts");
  if (Array.isArray(list)) {
    MODE = "server"; SROWS = list;
    STXS = (await eaccApi("/api/transactions")) || [];
    serverRender();
  }
  else {
    MODE = "error";
    $("filterChips").innerHTML = "";
    $("summary").innerHTML = '<span class="badge danger">서버 연결 실패</span> 샘플 목록으로 대체하지 않았습니다.';
    $("list").innerHTML = '<div class="card" style="margin-top:12px;text-align:center"><p class="muted" style="padding:28px 0">실제 영수증 목록을 불러오지 못했습니다.<br>서버 연결을 확인한 뒤 다시 시도해 주세요.</p><button class="btn primary" onclick="location.reload()">다시 불러오기</button></div>';
  }
})();
</script>
</body>
</html>
