<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AXE-acc 모바일 — 영수증 보관함</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body class="mobile">
<div class="app">
  <header class="app-head"></header>
  <main class="app-body">

    <div class="filter-wrap">
      <div class="chips" id="filterChips"></div>
    </div>

    <section class="card" id="summary" style="padding:12px 16px"></section>
    <section id="list"></section>

  </main>
  <nav class="tabbar"></nav>
</div>

<script src="../js/layout.js"></script>
<script src="../js/quick-data.js"></script>
<script src="js/m-chrome.js"></script>
<script>
const D = SKD;
SKM.chrome("receipts", "촬영·업로드한 영수증이 자동 분류되어 보관됩니다 (PC와 같은 저장소)");
const $ = (id) => document.getElementById(id);

let MODE = "fallback";
let SROWS = [];           // 서버 영수증
let filter = "all";

/* ── 서버 모드 ─────────────────────────────────────────── */
const S_FILTERS = [["all", "전체"], ["matched", "매칭 완료"], ["unmatched", "미매칭"]];

function serverRender() {
  $("filterChips").innerHTML = S_FILTERS.map(([k, label]) =>
    `<button class="chip ${filter === k ? "on brand" : ""}" data-k="${k}">${label}</button>`).join("");
  document.querySelectorAll("#filterChips .chip").forEach(c =>
    c.onclick = () => { filter = c.dataset.k; serverRender(); });

  const rows = SROWS.filter(r =>
    filter === "all" ? true : filter === "matched" ? !!r.matchedTxId : !r.matchedTxId
  ).sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));

  const total = rows.reduce((s, r) => s + (r.amountKRW || 0), 0);
  $("summary").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="muted">${S_FILTERS.find(f => f[0] === filter)[1]} ${rows.length}건 · 서버 실데이터</span>
      <b class="num" style="font-size:16px">${D.krw(total)}</b>
    </div>`;

  $("list").innerHTML = rows.length ? `
    <div class="card" style="padding:4px 16px;margin-top:12px">
      ${rows.map(r => {
        const o = r.ocr || {};
        const dupWarn = (r.checks || []).some(c => c.type === "DUPLICATE_DOCUMENT");
        return `
        <div class="rcpt-row">
          <div class="rcpt-thumb">${r.croppedUrl ? `<img src="${r.croppedUrl}" alt="">` : "🧾"}</div>
          <div class="rcpt-main">
            <div class="m1">${o.merchant || r.id}</div>
            <div class="m2">
              <span>${o.paidAt ? D.dt(o.paidAt) : ""}</span>
              ${r.presetId || r.suggestedPresetId ? '<span class="badge brand" style="font-size:10px">⚡ 프리셋</span>' : ""}
              ${dupWarn ? '<span class="badge danger" style="font-size:10px">중복 의심</span>' : ""}
            </div>
          </div>
          <div class="rcpt-amt">
            <div class="a1 num">${D.krw(r.amountKRW || 0)}</div>
            <div class="a2">${r.matchedTxId ? '<span class="badge ok">매칭 완료</span>' : '<span class="badge neutral">미매칭</span>'}</div>
          </div>
        </div>`;
      }).join("")}
    </div>
    <p class="muted" style="margin-top:10px;line-height:1.5;text-align:center">매칭·전표 생성은 <b>PC AXE-acc › 간편정산</b>에서 진행하세요</p>`
    : `<p class="muted" style="text-align:center;padding:40px 0">해당 조건의 영수증이 없습니다 — <a href="capture.html" style="color:var(--sk-red);font-weight:700">촬영하기</a></p>`;
}

/* ── 폴백 모드 (시제품#1 원본 로직) ────────────────────── */
let expanded = null;
const resolved = {};
const FILTERS = [["all", "전체"], ...D.GROUP_ORDER.map(g => [g, D.GROUPS[g].name]), ["review", "확인 필요"]];

function fallbackRender() {
  $("filterChips").innerHTML = FILTERS.map(([k, label]) =>
    `<button class="chip ${filter === k ? "on brand" : ""}" data-k="${k}">${label}</button>`).join("");
  document.querySelectorAll("#filterChips .chip").forEach(c =>
    c.onclick = () => { filter = c.dataset.k; fallbackRender(); });

  const rows = D.valid().filter(r =>
    filter === "all" ? true : filter === "review" ? r.status === "review" : D.groupOf(r) === filter
  ).sort((a, b) => b.paidAt.localeCompare(a.paidAt));

  const total = rows.reduce((s, r) => s + r.amountKRW, 0);
  $("summary").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="muted">${filter === "all" ? "전체" : FILTERS.find(f => f[0] === filter)[1]} ${rows.length}건 (내장 데모)</span>
      <b class="num" style="font-size:16px">${D.krw(total)}</b>
    </div>`;

  const byMonth = {};
  rows.forEach(r => { const m = r.paidAt.slice(0, 7); (byMonth[m] = byMonth[m] || []).push(r); });

  $("list").innerHTML = Object.keys(byMonth).sort().reverse().map(m => `
    <div class="section-title">${m.replace("-", "년 ")}월
      <span class="muted num">${D.krw(byMonth[m].reduce((s, r) => s + r.amountKRW, 0))}</span></div>
    <div class="card" style="padding:4px 16px">
      ${byMonth[m].map(r => {
        const G = D.GROUPS[D.groupOf(r)];
        const t = r.tripId ? D.TRIPS.find(x => x.id === r.tripId) : null;
        const url = D.imgUrl(r.img);
        const isReview = r.status === "review" && !resolved[r.id];
        const stateHtml = resolved[r.id]
          ? (resolved[r.id] === "personal" ? '<span class="badge neutral">개인경비 처리</span>' : '<span class="badge ok">수동 매칭 ✓</span>')
          : r.currency !== "KRW" ? D.money(r)
          : isReview ? '<span class="badge warn">확인 필요 ▾</span>' : "매칭 완료";
        return `
        <div class="rcpt-row" ${isReview ? `data-expand="${r.id}" style="cursor:pointer"` : ""}>
          <div class="rcpt-thumb">${url ? `<img src="${url}" alt="">` : (r.source === "pdf" ? "📄" : "🧾")}</div>
          <div class="rcpt-main">
            <div class="m1">${r.merchant}</div>
            <div class="m2">
              <span class="cat"><i style="background:${G.hex}"></i>${G.name} · ${D.subOf(r)}</span>
              <span>${D.dt(r.paidAt)}</span>
              ${t ? `<span class="badge neutral">${t.title.slice(0, 6)}…</span>` : ""}
            </div>
          </div>
          <div class="rcpt-amt">
            <div class="a1 num">${D.krw(r.amountKRW)}</div>
            <div class="a2">${stateHtml}</div>
          </div>
        </div>
        ${expanded === r.id && isReview ? `
        <div style="background:#FAFBFC;border:1px solid var(--line);border-radius:12px;padding:12px;margin:2px 0 10px">
          <div style="font-size:12px;font-weight:800;color:var(--ink-2);margin-bottom:8px">
            매칭 후보 선택 <span class="muted" style="font-weight:600">— 승인번호 미인식 건, 금액±3% 후보</span></div>
          ${D.candidatesFor(r).map(tx => `
            <button class="btn block cand" data-r="${r.id}" data-tx="${tx.id}"
              style="justify-content:space-between;margin-bottom:6px;font-size:12.5px">
              <span>${tx.merchant} · ${D.dt(tx.approvedAt)}</span>
              <b class="num">${D.krw(tx.amountKRW)}</b>
            </button>`).join("")}
          <button class="btn block cand" data-r="${r.id}" data-tx="personal"
            style="font-size:12.5px;color:var(--ink-3)">해당 승인내역 없음 — 개인경비로 처리</button>
        </div>` : ""}`;
      }).join("")}
    </div>`).join("") || `<p class="muted" style="text-align:center;padding:40px 0">해당 조건의 영수증이 없습니다</p>`;

  document.querySelectorAll("[data-expand]").forEach(el =>
    el.onclick = () => { expanded = expanded === el.dataset.expand ? null : el.dataset.expand; fallbackRender(); });
  document.querySelectorAll(".cand").forEach(b =>
    b.onclick = (e) => { e.stopPropagation(); resolved[b.dataset.r] = b.dataset.tx; expanded = null; fallbackRender(); });
}

/* ── 부팅 ─────────────────────────────────────────────── */
(async () => {
  const list = await eaccApi("/api/receipts");
  if (list) { MODE = "server"; SROWS = list; serverRender(); }
  else fallbackRender();
})();
</script>
</body>
</html>
