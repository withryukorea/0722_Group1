<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>e-Accounting - 나의 문서함</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/mydocs.css">
</head>
<body>

<div id="gnb"></div>

<div class="layout">
  <aside id="snb" class="snb"></aside>

  <main class="content">
    <div id="breadcrumb" class="breadcrumb"></div>
    <div class="page-heading">
      <h2 class="page-title"><span id="view-title">전체조회</span> <span class="fav off">★</span></h2>
    </div>

    <section class="filter-box mydocs-filter" aria-label="문서 검색 조건">
      <div class="filter-grid">
        <div class="field date-field">
          <select class="lbl-select" id="f-date-kind" aria-label="조회 일자 기준">
            <option value="draftDate">기안일자</option>
            <option value="postDate">전기일자</option>
            <option value="evidDate">증빙일자</option>
          </select>
          <div class="ctrl date-range">
            <input type="date" id="f-date-from" aria-label="조회 시작일">
            <span>~</span>
            <input type="date" id="f-date-to" aria-label="조회 종료일">
          </div>
        </div>
        <div class="field"><label for="f-title">결재/공사명</label><div class="ctrl"><input type="text" id="f-title"></div></div>
        <div class="field"><label for="f-type">전표유형</label><div class="ctrl">
          <select id="f-type"><option value="">전체</option><option>매입일반전표 (세금계산서)</option><option>SAP전표</option><option>법인카드전표</option><option>법인카드전표 (현업완결)</option><option>법인카드전표 (회계팀검토)</option><option>지급결의전표</option><option>거래처 변경/삭제</option></select>
        </div></div>

        <div class="field"><label for="f-progress">진행상태</label><div class="ctrl">
          <select id="f-progress"><option value="">전체</option><option>결재중</option><option>결재완료</option><option>반려</option><option>철회</option></select>
        </div></div>
        <div class="field"><label for="f-slip-state">전표상태</label><div class="ctrl">
          <select id="f-slip-state"><option value="">전체</option><option>기안전표</option><option>확정전표</option><option>SAP전표</option></select>
        </div></div>
        <div class="field"><label for="f-docno">전표번호</label><div class="ctrl"><input type="text" id="f-docno"></div></div>

        <div class="field"><label for="f-person" id="f-person-label">작성자</label><div class="ctrl"><input type="text" id="f-person"></div></div>
        <div class="field"><label for="f-company">회사</label><div class="ctrl">
          <select id="f-company"><option value="">전체</option><option>에스케이이노베이션 주식회사</option></select>
        </div></div>
        <div class="field"><label for="f-vendor">업체명</label><div class="ctrl"><input type="text" id="f-vendor"></div></div>
      </div>
      <div class="filter-actions">
        <button class="btn-search" id="btn-search" type="button">조회</button>
        <button class="btn-reset" id="btn-reset" type="button">초기화</button>
      </div>
    </section>

    <div class="toolbar">
      <span class="toolbar-spacer"></span>
      <button class="btn btn-line" id="btn-attachment" type="button"><span class="xls">▦</span> 첨부파일 다운로드</button>
      <button class="btn btn-pink" id="btn-approve" type="button">✔ 결재</button>
      <button class="btn btn-dark" id="btn-reject" type="button">↺ 반려</button>
      <button class="btn btn-dark" id="btn-withdraw" type="button" hidden>↩ 철회</button>
      <button class="btn btn-line" id="btn-export" type="button"><span class="xls">▦</span> 엑셀다운로드</button>
    </div>

    <div class="table-wrap scroll-y">
      <table class="grid mydocs-grid" id="doc-table">
        <colgroup id="doc-colgroup"></colgroup>
        <thead id="doc-head"></thead>
        <tbody id="doc-body">
          <tr class="empty-pad"><td>문서를 불러오는 중입니다.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="table-foot">
      <div class="total">Total : <b id="total">0</b></div>
      <div class="pagination" aria-label="페이지 이동">
        <button type="button">«</button><button type="button">‹</button><button type="button" class="cur">1</button><button type="button">›</button><button type="button">»</button>
      </div>
      <div class="psize"><select aria-label="페이지당 문서 수"><option>100</option><option>50</option><option>20</option></select></div>
    </div>
  </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="sr-only" id="sync-status" role="status" aria-live="polite"></div>

<script src="js/layout.js"></script>
<script src="js/mydocs-data.js"></script>
<script src="js/mydocs.js"></script>
</body>
</html>
