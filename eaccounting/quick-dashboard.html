<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AXE-acc - 간편정산 · 분석 대시보드</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/quick.css">
</head>
<body>

<div id="gnb"></div>

<div class="layout">
  <aside id="snb" class="snb"></aside>

  <main class="content">
    <div id="breadcrumb" class="breadcrumb"></div>
    <div class="page-heading">
      <h2 class="page-title">분석 대시보드 <span class="fav off">★</span></h2>
    </div>

    <div class="qk">
      <div class="page-head" style="margin-bottom:14px">
        <div class="desc">모바일·PC에서 등록된 모든 지출을 계정과목 기준으로 분석합니다 ·
          건별 내역은 <a href="quick-match.html" style="color:var(--sk-red);font-weight:700">자동매칭</a>에서 확인</div>
        <a class="btn primary" href="quick-upload.html" style="flex:0 0 auto">+ 영수증 업로드</a>
      </div>

      <!-- KPI -->
      <div class="grid kpi4" id="kpis" style="margin-bottom:16px"></div>

      <div class="grid c2" style="margin-bottom:16px">
        <section class="card">
          <div class="card-title">카테고리별 사용 구성 <span class="more" id="srcTag1">불러오는 중…</span></div>
          <div class="donut-wrap">
            <svg id="donut" width="210" height="210" viewBox="0 0 210 210" role="img" aria-label="카테고리별 사용 구성 도넛 차트"></svg>
            <div class="donut-list" id="donutList"></div>
          </div>
          <div class="legend" id="donutLegend"></div>
        </section>

        <section class="card">
          <div class="card-title">월별 사용 추이 <span class="more">카테고리 누적 · 단위 천원</span></div>
          <div class="bars" id="bars"></div>
          <div class="legend" id="barsLegend"></div>
          <div class="chart-note">막대에 마우스를 올리면 월별 상세 금액이 표시됩니다</div>
        </section>
      </div>

      <div class="grid c2e" style="margin-bottom:16px">
        <section class="card">
          <div class="card-title">한도·프리셋 현황 <span class="more" id="srcTag2"></span></div>
          <div id="budgets"></div>
        </section>

        <section class="card">
          <div class="card-title">최근 등록 영수증 <a class="more" href="quick-match.html">전체보기 ›</a></div>
          <table class="tbl" id="recentTbl"></table>
        </section>
      </div>

      <div class="grid c2e">
        <section class="card">
          <div class="card-title">자동 분류 판정 가이드라인 <span class="more">왜 이렇게 분류됐나요?</span></div>
          <div id="rules"></div>
        </section>

        <section class="card">
          <div class="card-title">출장비 기준 대비 사용 <span class="more" id="srcTag3"></span></div>
          <div id="tripGauges"></div>
        </section>
      </div>
    </div>
  </main>
</div>

<script src="js/layout.js"></script>
<script src="js/quick-data.js"></script>
<script>
renderChrome({ top: '간편정산', active: '분석 대시보드',
               breadcrumb: ['메뉴', '간편정산', '분석 대시보드'] });

const D = SKD;
const tip = D.attachTip();
const $ = (id) => document.getElementById(id);

/* 차트 카테고리 (검증 팔레트: #EA002C #2563EB #0E9F6E #8B5CF6) */
const GDEF = {
  trip:         { name: "출장",   hex: "#EA002C" },
  ai:           { name: "AI구독", hex: "#2563EB" },
  general:      { name: "일반",   hex: "#0E9F6E" },
  unclassified: { name: "미분류", hex: "#8B5CF6" }
};
const G_ORDER = ["trip", "ai", "general", "unclassified"];
const groupOfCode = (code) =>
  /^TRAVEL_/.test(code) ? "trip" : code === "WELFARE_AI" ? "ai" : code === "UNCLASSIFIED" ? "unclassified" : "general";

/* ---- 공통 렌더러: segments = [{key,name,hex,total,subs:{label:amt}}], months = [{label,per:{key:amt},tot}] ---- */
function renderDonut(segments, grand) {
  const cx = 105, cy = 105, R = 88, r = 56;
  let a0 = -Math.PI / 2;
  const svg = $("donut");
  const live = segments.filter(s => s.total > 0);
  svg.innerHTML = live.map(s => {
    const a1 = a0 + (s.total / grand) * Math.PI * 2;
    const pad = 0.018;
    const s0 = a0 + pad, e0 = a1 - pad;
    const large = (e0 - s0) > Math.PI ? 1 : 0;
    const p = (a, rad) => `${cx + rad * Math.cos(a)},${cy + rad * Math.sin(a)}`;
    const d = `M ${p(s0, R)} A ${R} ${R} 0 ${large} 1 ${p(e0, R)} L ${p(e0, r)} A ${r} ${r} 0 ${large} 0 ${p(s0, r)} Z`;
    a0 = a1;
    return `<path d="${d}" fill="${s.hex}" data-k="${s.key}" style="cursor:pointer"></path>`;
  }).join("") + `
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" class="donut-center">사용 총액</text>
    <text x="${cx}" y="${cy + 16}" text-anchor="middle" style="font-size:16px;font-weight:800;fill:var(--ink)">${D.fmt(grand / 10000)}만원</text>`;

  svg.querySelectorAll("path").forEach(pth => {
    const s = live.find(x => x.key === pth.dataset.k);
    pth.addEventListener("mousemove", (e) => {
      const subs = Object.entries(s.subs).map(([k, v]) => `<span class="tl">${k}</span> ${D.krw(v)}`).join("<br>");
      tip.show(`<b>${s.name}</b> · ${D.krw(s.total)} (${Math.round(s.total / grand * 100)}%)<br>${subs}`, e.clientX, e.clientY);
    });
    pth.addEventListener("mouseleave", tip.hide);
  });

  $("donutList").innerHTML = live.map(s => {
    const subs = Object.entries(s.subs).sort((a, b) => b[1] - a[1])
      .map(([k, v]) => `${k} ${D.fmt(v / 1000)}천원`).join(" · ");
    return `
      <div class="row"><span class="cat"><i style="background:${s.hex}"></i></span>
        <span class="nm">${s.name}</span>
        <span class="pct">${Math.round(s.total / grand * 100)}%</span>
        <b class="num">${D.krw(s.total)}</b></div>
      <div class="subs">${subs}</div>`;
  }).join("");
  $("donutLegend").innerHTML = live.map(s =>
    `<span class="cat"><i style="background:${s.hex}"></i>${s.name}</span>`).join("");
}

function renderBars(months, defs) {
  const max = Math.max(...months.map(x => x.tot), 1);
  const H = 150;
  $("bars").innerHTML = months.map(x => `
    <div class="bcol">
      <span class="bv num">${D.fmt(x.tot / 1000)}k</span>
      <div class="stack" data-m="${x.label}" style="height:${Math.max(4, x.tot / max * H)}px">
        ${G_ORDER.filter(k => (x.per[k] || 0) > 0).map(k =>
          `<div class="seg" style="flex:${x.per[k]};background:${defs[k].hex}"></div>`).join("")}
      </div>
      <span class="bl">${x.label.slice(2).replace("-", ".")}</span>
    </div>`).join("");
  document.querySelectorAll(".stack").forEach(st => {
    const x = months.find(b => b.label === st.dataset.m);
    st.addEventListener("mousemove", (e) => {
      const lines = G_ORDER.filter(k => (x.per[k] || 0) > 0)
        .map(k => `<span class="tl">${defs[k].name}</span> ${D.krw(x.per[k])}`).join("<br>");
      tip.show(`<b>${x.label.replace("-", "년 ")}월</b> · ${D.krw(x.tot)}<br>${lines}`, e.clientX, e.clientY);
    });
    st.addEventListener("mouseleave", tip.hide);
  });
  $("barsLegend").innerHTML = G_ORDER.filter(k => defs[k]).map(k =>
    `<span class="cat"><i style="background:${defs[k].hex}"></i>${defs[k].name}</span>`).join("");
}

/* ---- 부팅: 서버 stats 우선, 실패 시 내장 데모 ---- */
(async () => {
  const stats = await eaccApi("/api/stats");
  const receipts = stats ? await eaccApi("/api/receipts") : null;

  if (stats) {
    /* KPI */
    $("kpis").innerHTML = `
      <div class="card kpi accent">
        <div class="k-label">등록 지출 총액 <span class="badge neutral" style="background:rgba(255,255,255,.2);color:#fff">서버 실데이터</span></div>
        <div class="k-val num">${D.krw(stats.totalKRW)}</div>
        <div class="k-sub">영수증 ${stats.count}건 · 외화 자동 환산 포함</div>
      </div>
      <div class="card kpi">
        <div class="k-label">매칭 현황</div>
        <div class="k-val num">${stats.matched}<span style="font-size:14px;color:var(--ink-3)"> / ${stats.count}건</span></div>
        <div class="k-sub">미매칭 ${stats.unmatched}건 — 자동매칭에서 처리</div>
      </div>
      <div class="card kpi">
        <div class="k-label">상신 전표 <span class="badge ${stats.vouchers.count ? "ok" : "neutral"}">${stats.vouchers.count}건</span></div>
        <div class="k-val num">${D.krw(stats.vouchers.totalKRW)}</div>
        <div class="k-sub">나의 문서함에서 결재 진행</div>
      </div>
      <div class="card kpi">
        <div class="k-label">미분류 지출</div>
        <div class="k-val num">${D.krw((stats.byAccount.find(a => a.code === "UNCLASSIFIED") || {}).totalKRW || 0)}</div>
        <div class="k-sub">매칭·프리셋 확정 시 자동 분류됩니다</div>
      </div>`;

    /* 도넛: 계정 → 카테고리 그룹, subs = 계정과목명 */
    const segs = G_ORDER.map(k => ({ key: k, ...GDEF[k], total: 0, subs: {} }));
    stats.byAccount.forEach(a => {
      const s = segs.find(x => x.key === groupOfCode(a.code));
      s.total += a.totalKRW;
      s.subs[a.name] = (s.subs[a.name] || 0) + a.totalKRW;
    });
    renderDonut(segs, stats.totalKRW || 1);
    $("srcTag1").textContent = "서버 실데이터 · 계정과목 기준";

    /* 월별 */
    renderBars(stats.byMonth.map(m => {
      const per = {};
      Object.entries(m.byAccount).forEach(([code, v]) => {
        const k = groupOfCode(code); per[k] = (per[k] || 0) + v;
      });
      return { label: m.month, per, tot: m.totalKRW };
    }), GDEF);

    /* 한도·프리셋 (실데이터) */
    $("srcTag2").textContent = "서버 실데이터 · 상신 전표만 차감";
    $("budgets").innerHTML = stats.presets.filter(p => p.limitKRW).map(p => {
      const pct = Math.min(100, p.usedKRW / p.limitKRW * 100), over = p.usedKRW > p.limitKRW;
      return `
      <div class="gauge ${over ? "over" : ""}" style="margin-bottom:16px">
        <div class="g-head"><span>${p.type === "TRIP" ? "✈" : "⚡"} ${p.name}</span><b class="num">${D.krw(p.usedKRW)} / ${D.krw(p.limitKRW)}</b></div>
        <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
        <div class="g-foot"><span>${Math.round(pct)}% 소진</span>
          <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "⚠ 초과 " + D.krw(p.usedKRW - p.limitKRW) : "잔여 " + D.krw(p.limitKRW - p.usedKRW)}</span></div>
      </div>`;
    }).join("") || '<p class="muted">한도가 설정된 프리셋이 없습니다</p>';

    /* 최근 등록 */
    const recent = (receipts || []).slice()
      .sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).slice(0, 6);
    $("recentTbl").innerHTML = recent.length ? `
      <thead><tr><th>가맹점</th><th>영수증</th><th>일시</th><th style="text-align:right">환산(₩)</th></tr></thead>
      <tbody>${recent.map(r => {
        const o = r.ocr || {};
        return `<tr>
          <td style="font-weight:700">${o.merchant || "(미인식)"}</td>
          <td class="muted">${r.id}${r.matchedTxId ? ' <span class="badge ok" style="font-size:10px">매칭</span>' : ""}</td>
          <td class="muted">${o.paidAt ? D.dt(o.paidAt) : "—"}</td>
          <td class="num">${D.krw(r.amountKRW || 0)}</td></tr>`;
      }).join("")}</tbody>`
      : '<tbody><tr><td class="muted" style="padding:16px">아직 등록된 영수증이 없습니다</td></tr></tbody>';

    /* 출장 게이지 — 정산 단위/일정 설정의 TRIP 정산단위 실데이터로 동기화 */
    renderTripGauges((await eaccApi("/api/presets?type=TRIP&active=true")) || []);
  } else {
    /* ── 폴백: 시제품#1 내장 데모 ── */
    const all = D.valid();
    const GT = D.groupTotals();
    const grand = Object.values(GT).reduce((s, g) => s + g.total, 0);
    const july = all.filter(r => r.paidAt.startsWith("2026-07"));
    const reviewN = all.filter(r => r.status === "review").length;
    $("kpis").innerHTML = `
      <div class="card kpi accent">
        <div class="k-label">사용 총액 (내장 데모)</div>
        <div class="k-val num">${D.krw(grand)}</div>
        <div class="k-sub">영수증 ${all.length}건 · 외화 자동 환산 포함</div>
      </div>
      <div class="card kpi">
        <div class="k-label">이번 달 사용 <span class="badge neutral">2026.07</span></div>
        <div class="k-val num">${D.krw(july.reduce((s, r) => s + r.amountKRW, 0))}</div>
        <div class="k-sub">${july.length}건</div>
      </div>
      <div class="card kpi">
        <div class="k-label">확인 필요 <span class="badge warn">${reviewN}건</span></div>
        <div class="k-val num">${reviewN}<span style="font-size:14px;color:var(--ink-3)"> 건</span></div>
        <div class="k-sub">중복 인보이스 자동 제외</div>
      </div>
      <div class="card kpi">
        <div class="k-label">AI구독 한도</div>
        <div class="k-val num">${D.krw(Math.abs(D.BUDGETS[0].limitKRW - D.BUDGETS[0].usedKRW))}</div>
        <div class="k-sub">DIY100 연 100만원(VAT별도) 기준</div>
      </div>`;

    const DEMO_DEF = {
      trip:         { name: "국내출장", hex: "#EA002C" },
      ai:           { name: "AI구독",   hex: "#2563EB" },
      general:      { name: "일반",     hex: "#0E9F6E" },
      unclassified: { name: "해외출장", hex: "#D96414" }
    };
    const mapG = { domestic: "trip", ai: "ai", general: "general", foreign: "unclassified" };
    const segs = G_ORDER.map(k => ({ key: k, ...DEMO_DEF[k], total: 0, subs: {} }));
    D.GROUP_ORDER.forEach(g => {
      const s = segs.find(x => x.key === mapG[g]);
      s.total = GT[g].total; s.subs = GT[g].subs;
    });
    renderDonut(segs, grand);
    $("srcTag1").textContent = "내장 데모 데이터 기준";

    const months = [...new Set(all.map(r => r.paidAt.slice(0, 7)))].sort();
    renderBars(months.map(m => {
      const rows = all.filter(r => r.paidAt.startsWith(m));
      const per = {}; let tot = 0;
      rows.forEach(r => { const k = mapG[D.groupOf(r)]; per[k] = (per[k] || 0) + r.amountKRW; tot += r.amountKRW; });
      return { label: m, per, tot };
    }), DEMO_DEF);

    $("srcTag2").textContent = "내장 데모 데이터 기준";
    $("budgets").innerHTML = D.BUDGETS.map(b => {
      const pct = Math.min(100, b.usedKRW / b.limitKRW * 100), over = b.usedKRW > b.limitKRW;
      return `
      <div class="gauge ${over ? "over" : ""}" style="margin-bottom:16px">
        <div class="g-head"><span>${b.label}</span><b class="num">${D.krw(b.usedKRW)} / ${D.krw(b.limitKRW)}</b></div>
        <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
        <div class="g-foot"><span>${Math.round(pct)}% 소진</span>
          <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "⚠ 초과" : "잔여 " + D.krw(b.limitKRW - b.usedKRW)}</span></div>
      </div>`;
    }).join("");

    $("recentTbl").innerHTML = `
      <thead><tr><th>가맹점</th><th>분류</th><th>일시</th><th style="text-align:right">금액</th></tr></thead>
      <tbody>${all.slice().sort((a, b) => b.paidAt.localeCompare(a.paidAt)).slice(0, 6).map(r => {
        const G = D.GROUPS[D.groupOf(r)];
        return `<tr>
          <td style="font-weight:700">${r.merchant}</td>
          <td><span class="cat"><i style="background:${G.hex}"></i>${G.name} · ${D.subOf(r)}</span></td>
          <td class="muted">${D.dt(r.paidAt)}</td>
          <td class="num">${D.krw(r.amountKRW)}</td></tr>`;
      }).join("")}</tbody>`;

    renderTripGaugesDemo();
  }
})();

/* ---- 가이드라인 (정적 콘텐츠) ---- */
$("rules").innerHTML = D.RULES.map((r, i) => `
  <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);${i === D.RULES.length - 1 ? "border-bottom:none" : ""}">
    <span style="flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--sk-grad);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center">${i + 1}</span>
    <div style="font-size:13px"><b>${r.t}</b><div class="muted" style="margin-top:2px;line-height:1.5">${r.d}</div></div>
  </div>`).join("");

/* ---- 출장 게이지: 서버 연결 시 TRIP 정산단위 실데이터, 미연결 시 내장 데모 폴백 ---- */
function renderTripGauges(trips) {
  $("srcTag3").textContent = "서버 실데이터 · 정산 단위/일정 설정 연동";
  $("tripGauges").innerHTML = trips.map(p => {
    const used = (p.usage && p.usage.usedKRW) || 0;
    const limit = (p.rules && p.rules.limitKRW) || 0;
    const pct = limit ? Math.min(100, used / limit * 100) : 0;
    const over = limit && used > limit;
    const [sLabel, sClass] = !p.period ? ["상시", "neutral"]
      : p.period.start > D.TODAY ? ["예정", "info"]
      : p.period.end < D.TODAY ? ["완료", "neutral"] : ["진행중", "brand"];
    const perLabel = p.rules.limitPeriod === "daily" ? "일당" : p.rules.limitPeriod === "monthly" ? "월" : "총";
    const foreign = p.meta && p.meta.country && p.meta.country !== "KR";
    const periodTxt = p.period ? `${D.dateShort(p.period.start)}–${D.dateShort(p.period.end)}` : "";
    return `
  <div class="gauge ${over ? "over" : ""}" style="margin-bottom:16px">
    <div class="g-head">
      <span>${foreign ? "✈" : "🚄"} <b>${p.name}</b>
        <span class="badge ${sClass}" style="margin-left:4px">${sLabel}</span></span>
      <b class="num">${limit ? `${D.krw(used)} / ${D.krw(limit)}` : D.krw(used)}</b>
    </div>
    <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
    <div class="g-foot"><span>${periodTxt}${p.meta && p.meta.destination ? ` · ${p.meta.destination}` : ""}${limit ? ` · ${perLabel} 한도` : ""}</span>
      <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "기준 초과 " + D.krw(used - limit) : sLabel === "예정" ? "일정 대기" : "기준 이내 ✓"}</span></div>
  </div>`;
  }).join("") || '<p class="muted">등록된 출장 정산단위가 없습니다 — <a href="quick-presets.html">정산 단위/일정 설정</a>에서 등록하세요</p>';
}

function renderTripGaugesDemo() {
  $("srcTag3").textContent = "내장 데모 데이터 기준";
  $("tripGauges").innerHTML = D.TRIPS.filter(t => t.status !== "planned").map(t => {
    const cap = D.tripCap(t), spent = D.tripSpent(t);
    const pct = Math.min(100, spent / cap * 100), over = spent > cap;
    return `
  <div class="gauge ${over ? "over" : ""}" style="margin-bottom:16px">
    <div class="g-head">
      <span>${t.type === "domestic" ? "🚄" : "✈"} <b>${t.title}</b></span>
      <b class="num">${D.krw(spent)} / ${D.krw(cap)}</b>
    </div>
    <div class="g-track"><div class="g-fill" style="width:${pct}%"></div></div>
    <div class="g-foot"><span>${t.capNote}</span>
      <span style="font-weight:700;color:${over ? "var(--danger)" : "var(--ok)"}">${over ? "기준 초과" : "기준 이내 ✓"}</span></div>
  </div>`;
  }).join("");
}
</script>
</body>
</html>
