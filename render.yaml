# Render Blueprint — 가짜 e-Accounting 서버 자동 배포 설정
# 사용법: Render 대시보드 → New → Blueprint → 이 저장소 선택 → Apply
# (render.yaml 을 자동으로 읽어 아래 설정대로 웹 서비스를 만든다)
services:
  - type: web
    name: mock-eaccounting
    runtime: node
    plan: free            # 무료 플랜 (미사용 시 잠들었다가 첫 요청에 다시 깨어남)
    region: singapore     # 한국에서 가장 가까운 리전
    buildCommand: npm install --prefix server
    startCommand: node server/index.js
    healthCheckPath: /api/transactions   # 이 경로가 200이면 정상 기동으로 판단
    autoDeploy: true      # main 에 푸시하면 자동 재배포
    envVars:
      - key: LETSUR_API_KEY
        sync: false       # Render Environment에서 비공개 값으로 설정 (실 이미지 OCR 활성화)
      - key: LETSUR_BASE_URL
        value: https://gw.letsur.ai
      - key: OCR_MODEL
        value: gpt-4o
      - key: OCR_TIMEOUT_MS
        value: 30000
      - key: SUPABASE_URL
        sync: false       # Supabase 프로젝트의 Project URL
      - key: SUPABASE_SECRET_KEY
        sync: false       # Supabase 서버 전용 sb_secret 키
      - key: SUPABASE_BUCKET
        value: receipt-images
      - key: SUPABASE_STATE_ID
        value: main
      - key: RESEED_ON_BOOT
        value: "0"          # 시연 모드: "1"로 바꾸면 재배포·재시작할 때마다 시드 초기값으로 리셋(저장상태 덮어씀).
                            # 평상시 "0"이면 업로드/수정 내역이 재부팅 후에도 유지된다.
